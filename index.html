<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CaseFit India</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
      padding:20px;
    }
    select,input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-top:10px;
      font-size:16px;
    }
    .card{
      background:#222;
      padding:15px;
      border-radius:15px;
      margin-top:15px;
    }
    .info-box{
      margin-top:20px;
      padding:14px;
      background:#1c1c1c;
      border-radius:12px;
      color:#bbb;
    }
    .btn{
      display:block;
      text-align:center;
      padding:14px;
      background:#4da6ff;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      margin-top:20px;
    }
  </style>
</head>
<body>
  <h1>CaseFit India</h1>
  <p>Brand wise mobile case compatibility checker</p>

  <select id="brand" onchange="searchPhones()">
    <option value="">All Brands</option>
    <option value="Redmi">Redmi</option>
    <option value="Vivo">Vivo</option>
    <option value="Samsung">Samsung</option>
    <option value="Moto">Moto</option>
    <option value="Pixel">Pixel</option>
    <option value="Realme">Realme</option>
  </select>

  <input id="search" placeholder="Search model..." oninput="searchPhones()"/>

  <div id="results"></div>

  <div class="info-box">
    📢 More phone models and same-fit groups will be added soon.<br><br>
    📩 Contact:
    <a href="mailto:adilpkd690@gmail.com" style="color:#4da6ff;">
      adilpkd690@gmail.com
    </a>
  </div>

  <a href="https://forms.gle/yourformlink" target="_blank" class="btn">
    📱 Request Your Model
  </a>

  <script>
    const phones = [
      { brand:"Redmi", model:"Redmi 12 5G", fit:"Also fits Poco M6 Pro" },
      { brand:"Redmi", model:"Redmi Note 7", fit:"Also fits Redmi Note 7 Pro" },
      { brand:"Redmi", model:"Redmi 8", fit:"Also fits Redmi 8A / 8A Dual" },
      { brand:"Redmi", model:"Redmi 9A", fit:"Also fits Redmi 9i" },
      { brand:"Redmi", model:"Redmi 9C", fit:"Also fits Redmi 10A / Poco C3 / Poco C31" },
      { brand:"Redmi", model:"Redmi 9", fit:"Also fits Redmi 9 Prime / Poco M2" },
      { brand:"Redmi", model:"Redmi Note 10 Pro", fit:"Also fits Note 10 Pro Max" },
      { brand:"Redmi", model:"Redmi Note 14 Pro", fit:"Also fits 14 Pro Plus" },

      { brand:"Vivo", model:"iQOO Z6", fit:"Also fits Vivo T1 5G / Y55 / Y75 5G" },
      { brand:"Vivo", model:"iQOO Z3", fit:"Also fits Vivo Y72 5G" },
      { brand:"Vivo", model:"Vivo V40", fit:"Also fits V40 Pro / T3 Ultra" },

      { brand:"Moto", model:"Moto G85", fit:"Also fits G96 / 50 Fusion" },
      { brand:"Pixel", model:"Pixel 9", fit:"Also fits Pixel 9 Pro" },

      { brand:"Realme", model:"Realme C2", fit:"Also fits Oppo A3s / A1k" },
      { brand:"Realme", model:"Realme C55", fit:"Also fits Narzo N55" },

      { brand:"Samsung", model:"Samsung A02", fit:"Also fits M02 / A022" },
      { brand:"Samsung", model:"Samsung A05", fit:"Also fits M05 / F05" },
      { brand:"Samsung", model:"Samsung A12", fit:"Also fits M12 / F12" }
    ];

    function searchPhones(){
      const q=document.getElementById("search").value.toLowerCase();
      const b=document.getElementById("brand").value;
      const results=document.getElementById("results");
      results.innerHTML="";

      phones
        .filter(p =>
          (b==="" || p.brand===b) &&
          (p.model.toLowerCase().includes(q) || p.fit.toLowerCase().includes(q))
        )
        .forEach(phone=>{
          results.innerHTML += `
            <div class="card">
              <h3>${phone.brand} - ${phone.model}</h3>
              <p>${phone.fit}</p>
            </div>
          `;
        });
    }

    searchPhones();
  </script>
</body>
</html>
