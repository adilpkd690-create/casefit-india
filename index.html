<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CASE FIT</title>
<style>
body{margin:0;background:#020b4d;color:#fff;font-family:Arial,sans-serif} .wrap{max-width:420px;margin:auto;padding:24px} h1{text-align:center;font-size:64px;letter-spacing:4px;font-family:Georgia,serif} .btn{display:block;text-decoration:none;background:#2bd15f;color:#000;padding:22px;border-radius:26px;font-size:28px;font-weight:700;text-align:center;margin:18px 0}.search{width:100%;padding:18px 20px;border-radius:20px;border:1px solid #445;background:#101a54;color:#fff;font-size:24px;box-sizing:border-box;margin:18px 0}.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:28px;margin:18px 0}.title{font-size:28px;color:#39e56a;font-weight:700}.fit{font-size:22px;color:#fff;margin-top:14px}.hl{background:#ffd84d;color:#000;padding:2px 6px;border-radius:8px}.warn{display:inline-block;margin-top:18px;border:1px solid #a55;color:#ff9ea8;padding:10px 16px;border-radius:999px}.note{color:#ff9ea8;font-size:14px;margin-top:12px}</style>
</head>
<body>
<div class="wrap">
<h1>CASE FIT</h1>
<a href="#search" class="btn">🔎 Find Suitable Case</a>
<div id="searchPage">
<input id="searchBox" class="search" placeholder="Search any model directly..." oninput="filterModels()" />
<div id="list"></div>
</div>
</div>
<script>
const models=[
{n:'Redmi M3 / M2',f:'',check:true},
{n:'Redmi 7',f:'Also fits Redmi Y3'},
{n:'Redmi 12 5G',f:'Also fits Poco M6 Pro'},
{n:'Redmi Note 7',f:'Also fits Redmi Note 7 Pro'},
{n:'Redmi 8',f:'Also fits Redmi 8A / Redmi 8A Dual'},
{n:'Redmi 9A',f:'Also fits Redmi 9i'},
{n:'Redmi 9C',f:'Also fits Redmi 10A / Poco C3 / Poco C31'},
{n:'Redmi 9',f:'Also fits Redmi 9 Prime'},
{n:'Redmi Note 10 Pro',f:'Also fits Redmi Note 10 Pro Max'},
{n:'Redmi Note 10 4G',f:'Also fits Note 10s / Note 11SE / Poco M5s 4G'},
{n:'Redmi 13C 4G',f:'Also fits Redmi 13C 5G / Poco C65',open:true},
{n:'Poco X6 Pro',f:'Also fits Redmi K70E 5G'},
{n:'iQOO Z6',f:'Also fits Vivo T1 5G / Vivo Y55 / Vivo Y75 5G'},
{n:'iQOO Z3',f:'Also fits Vivo Y72 5G'},
{n:'iQOO Neo 7',f:'Also fits Neo 7 Pro'},
{n:'Vivo Y16',f:'Also fits Vivo Y56 5G / Y02s / Y35 5G / T2x / iQOO Z7i'},
{n:'Moto G85',f:'Also fits G96 / 50 Fusion'},
{n:'Moto G31',f:'Also fits G41'},
{n:'Pixel 9',f:'Also fits Pixel 9 Pro open type',open:true},
{n:'Pixel 10',f:'Also fits Pixel 10 Pro open type',open:true},
{n:'Realme C2',f:'Also fits Oppo A3s / Oppo A1K'},
{n:'Realme C55 4G',f:'Also fits Narzo N55 4G'},
{n:'Oppo F27',f:'Also fits Reno 12F 4G/5G / Reno 12 FS 5G'},
{n:'Oppo A57',f:'Also fits A77 / A77s / A57e / A57s / Narzo 50 5G / Nord N300'},
{n:'Samsung A02',f:'Also fits M02 / A022'},
{n:'Samsung A02s',f:'Also fits M02s'},
{n:'Samsung M13',f:'Also fits A04e'},
{n:'Samsung A05 4G',f:'Also fits M05 / F05 4G'},
{n:'Samsung F06 5G',f:'Also fits M06 5G'},
{n:'Samsung F14 5G',f:'Also fits M14'},
{n:'Samsung A10',f:'Also fits M10'},
{n:'Samsung A10s',f:'Also fits M01s'},
{n:'Samsung A11',f:'Also fits M11'},
{n:'Samsung A12',f:'Also fits M12 / F12 / 4G-5G open type',open:true},
{n:'Samsung A13',f:'Also fits A32 5G / M32 5G / 4G-5G open type',open:true},
{n:'Samsung M23',f:'Also fits F23'},
{n:'Samsung A13 5G',f:'Also fits A04s'},
{n:'Samsung A14 4G/5G',f:''},
{n:'Samsung M16 5G',f:'Also fits F16 5G'},
{n:'Samsung A20',f:'Also fits A30 / M10s'},
{n:'Samsung A22 4G',f:'Also fits M32 4G'},
{n:'Samsung A22 5G',f:'Also fits A22s 5G / F42 5G'},
{n:'Samsung A24 4G',f:'Also fits A25 5G',check:true},
{n:'Samsung A32 4G',f:'Also fits M32'},
{n:'Samsung A52',f:'Also fits A52 5G / A52s 5G'}
];
function render(items,q=''){
 const list=document.getElementById('list');
 list.innerHTML=items.map(m=>{let title=m.n; let fit=m.f||''; if(q){const r=new RegExp(q,'ig'); title=title.replace(r,s=>`<span class="hl">${s}</span>`); fit=fit.replace(r,s=>`<span class="hl">${s}</span>`);} return `<div class="card"><div class="title">${title}</div>${fit?`<div class="fit">${fit}</div>`:''}${m.open?`<div class="warn" style="color:#f7d25d;border-color:#8a6">OPEN TYPE</div> <div class="warn">CHECK BEFORE BUY</div><div class="note">Verify camera cutout, fingerprint slot, and speaker holes before final use.</div>`:m.check?`<div class="warn">CHECK BEFORE BUY</div><div class="note">Verify camera cutout, fingerprint slot, and speaker holes before final use.</div>`:''}</div>`}).join('');
}
function filterModels(){const q=document.getElementById('searchBox').value.trim(); const items=models.filter(m=>(m.n+' '+m.f).toLowerCase().includes(q.toLowerCase())); render(items,q.replace(/[.*+?^${}()|[\]\]/g,'\$&'));}
render(models);
</script>
</body>
</html>
