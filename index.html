<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CASE FIT | Smart Finder</title>
<style>
:root {
  --primary: #00f2fe;
  --secondary: #4facfe;
  --accent: #ff9a9e;
  --bg-dark: #0f172a;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  color: #f8fafc;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
}

.wrap {
  max-width: 430px;
  margin: auto;
  padding: 40px 20px;
}

h1 {
  text-align: center;
  font-size: 42px;
  font-weight: 900;
  letter-spacing: -1px;
  margin: 20px 0 40px;
  background: linear-gradient(to right, #00f2fe, #4facfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: #fff;
  text-decoration: none;
  padding: 18px;
  border-radius: 20px;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.btn:active { transform: scale(0.96); }

.casebtn { 
    background: linear-gradient(135deg, #05d5ff, #007bff); 
    box-shadow: 0 10px 20px rgba(0, 123, 255, 0.2);
    border: none;
}

.glassbtn { border-color: #48c7f5; color: #48c7f5; }

.soon {
  padding: 18px;
  text-align: center;
  font-weight: 500;
  opacity: 0.6;
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.search {
  width: 100%;
  padding: 18px 24px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  background: var(--glass);
  backdrop-filter: blur(15px);
  color: #fff;
  font-size: 16px;
  box-sizing: border-box;
  margin-bottom: 24px;
  outline: none;
}

.search:focus { border-color: var(--primary); }

.card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 16px;
  transition: transform 0.2s;
}

.title { font-size: 20px; color: #fff; font-weight: 700; margin-bottom: 4px; }
.fit { font-size: 15px; color: #94a3b8; line-height: 1.4; }

.badges { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
.badge-open, .badge-check {
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}
.badge-open { background: rgba(243, 202, 84, 0.1); color: #f3ca54; }
.badge-check { background: rgba(255, 158, 168, 0.1); color: #ff9ea8; }

.page { display: none; animation: fadeIn 0.4s ease; }
.page.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.back {
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  background: var(--glass);
  text-decoration: none;
  width: 50px;
  height: 50px;
  border-radius: 15px;
  font-size: 24px;
  margin-bottom: 20px;
  border: 1px solid var(--glass-border);
}

.contact {
  margin-top: 40px;
  text-align: center;
}
.contact-btn {
  display: block;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: #94a3b8;
  text-decoration: none;
  padding: 14px;
  border-radius: 15px;
  font-size: 14px;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class='wrap'>
  <div id='homePage' class='page active'>
    <h1>CASE FIT</h1>
    <a class='btn casebtn' href='#' onclick="showPage('searchPage');return false;">🔍 Find Suitable Case</a>
    <a class='btn glassbtn' href='#' onclick="showPage('glassPage');return false;">🛡️ Screen Glass</a>
    <div class='soon'>— More Models Soon —</div>
    
    <div class='contact'>
      <span style="font-size: 13px; color: #64748b;">Need help?</span>
      <a class="contact-btn" href='mailto:adilpkd690@gmail.com'>adilpkd690@gmail.com</a>
    </div>
  </div>

  <div id='searchPage' class='page'>
    <a class='back' href='#' onclick="showPage('homePage');return false;">←</a>
    <input id='searchBox' class='search' placeholder='Search model (e.g. Redmi 12)...' oninput='filterModels()'>
    <div id='list'></div>
  </div>

  <div id='glassPage' class='page'>
    <a class='back' href='#' onclick="showPage('homePage');return false;">←</a>
    <div class='card' style="text-align: center; border-color: var(--secondary);">
      <div class='title' style='color: var(--secondary)'>🛡️ SCREEN GLASS</div>
      <div class='fit'>Adding database... Please wait!</div>
    </div>
  </div>
</div>

<script>
// Data and Functions are the same as yours to keep it working perfectly
const models = [
    {n:'Redmi M3 / M2',check:true},{n:'Redmi 7',f:'Also fits Redmi Y3'},{n:'Redmi 12 5G',f:'Also fits Poco M6 Pro'},{n:'Redmi Note 7',f:'Also fits Redmi Note 7 Pro'},{n:'Redmi 8',f:'Also fits Redmi 8A / Redmi 8A Dual'},{n:'Redmi 9A',f:'Also fits Redmi 9i'},{n:'Redmi 9C',f:'Also fits Redmi 10A / Poco C3 / Poco C31'},{n:'Redmi 9',f:'Also fits Redmi 9 Prime'},{n:'Redmi Note 10 Pro',f:'Also fits Redmi Note 10 Pro Max'},{n:'Redmi 13C 4G',f:'Also fits Redmi 13C 5G / Poco C65',open:true},{n:'Poco X6 Pro',f:'Also fits Redmi K70e 5G'},{n:'iQOO Z6',f:'Also fits Vivo T1 5G / Vivo Y55 / Vivo Y75 5G'},{n:'Moto G85',f:'Also fits G96 / 50 Fusion'},{n:'Pixel 9',f:'Also fits Pixel 9 Pro',open:true},{n:'Realme C2',f:'Also fits Oppo A3s / Oppo A1K'},{n:'Samsung A12',f:'Also fits M12 / F12 / 4G-5G open type',open:true},{n:'Samsung A13',f:'Also fits A32 5G / M32 5G / 4G-5G open type',open:true},{n:'Samsung M23',f:'Also fits F23'},{n:'Samsung A24 4G',f:'Also fits A25 5G',check:true},{n:'Samsung A52 4G',f:'Also fits A52 5G / A52s 5G'}
];

function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\\]\\]/g,'\\$&')}
function render(items,q=''){
    document.getElementById('list').innerHTML=items.map(m=>`
    <div class='card'>
        <div class='title'>${m.n}</div>
        ${m.f?`<div class='fit'>${m.f}</div>`:''}
        ${m.open||m.check?`<div class='badges'>
            ${m.open?`<span class='badge-open'>OPEN TYPE</span>`:''}
            ${m.check?`<span class='badge-check'>CHECK BEFORE BUY</span>`:''}
        </div>`:''}
    </div>`).join('');
}

function filterModels(){
    const q=document.getElementById('searchBox').value.trim().toLowerCase();
    render(models.filter(m=>(`${m.n} ${m.f||''}`).toLowerCase().includes(q)),q);
}

function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id==='searchPage'){ render(models); setTimeout(()=>document.getElementById('searchBox').focus(),100); }
}
render(models);
</script>
</body>
</html>
