<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CASE FIT</title>
<style>
body{margin:0;background:#020b4d;color:#fff;font-family:Arial,sans-serif}
.wrap{max-width:430px;margin:auto;padding:24px 20px 60px}
h1{text-align:center;font-size:64px;letter-spacing:4px;font-family:Georgia,serif;margin:20px 0 28px}
.btn{display:block;color:#000;text-decoration:none;padding:22px;border-radius:28px;font-size:28px;font-weight:700;text-align:center;margin-bottom:18px}
.casebtn{background:#2bd15f}.glassbtn{background:#48c7f5}
.soon{border:2px solid #d9a11d;color:#d9a11d;border-radius:28px;padding:22px;font-size:26px;text-align:center;margin-bottom:22px}
.search{width:100%;padding:18px 20px;border-radius:22px;border:1px solid rgba(255,255,255,.15);background:#101a54;color:#fff;font-size:22px;box-sizing:border-box;margin-bottom:18px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:26px;margin-bottom:18px}
.title{font-size:28px;color:#39e56a;font-weight:700}.fit{font-size:20px;color:#fff;margin-top:12px;line-height:1.35}
.badges{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}.badge-open{border:1px solid #8b6b21;color:#f3ca54;padding:8px 14px;border-radius:999px;font-size:14px}.badge-check{border:1px solid #8c4750;color:#ff9ea8;padding:8px 14px;border-radius:999px;font-size:14px}.note{color:#ff9ea8;font-size:14px;margin-top:12px;line-height:1.4}.hl{background:#ffd84d;color:#000;padding:2px 6px;border-radius:8px}
.page{display:none}.page.active{display:block}.back{display:inline-block;color:#000;background:#2bd15f;text-decoration:none;width:58px;height:58px;line-height:58px;text-align:center;border-radius:18px;font-size:34px;font-weight:700;margin-bottom:18px}
.blink{animation:blink 1s infinite}@keyframes blink{50%{opacity:.35}}
.contact{margin-top:28px;border:1px solid rgba(255,255,255,.12);border-radius:26px;padding:18px;text-align:center}
.contact a{display:block;background:#48c7f5;color:#000;text-decoration:none;padding:16px;border-radius:18px;font-size:22px;font-weight:700}
</style>
</head>
<body>
<div class='wrap'>
  <div id='homePage' class='page active'>
    <h1>CASE FIT</h1>
    <a class='btn casebtn' href='#' onclick="showPage('searchPage');return false;">🔎 Find Suitable Case</a>
    <a class='btn glassbtn' href='#' onclick="showPage('glassPage');return false;">🛡️ Screen Glass</a>
    <div class='soon'>⚡ More Models Soon ⚡</div>
    <div class='contact'>
      <div style='font-size:18px;opacity:.9;margin-bottom:10px;'>📞 Contact</div>
      <a href='mailto:adilpkd690@gmail.com'>adilpkd690@gmail.com</a>
    </div>
  </div>  <div id='searchPage' class='page'>
    <a class='back' href='#' onclick="showPage('homePage');return false;">←</a>
    <input id='searchBox' class='search' placeholder='Search any model directly...' oninput='filterModels()'>
    <div id='list'></div>
  </div>  <div id='glassPage' class='page'>
    <a class='back' href='#' onclick="showPage('homePage');return false;">←</a>
    <div class='card blink'>
      <div class='title' style='color:#48c7f5'>🛡️ SCREEN GLASS</div>
      <div class='fit'>Coming Soon</div>
    </div>
  </div>
</div>
<script>
const models = [
{n:'Redmi M3 / M2',check:true},{n:'Redmi 7',f:'Also fits Redmi Y3'},{n:'Redmi 12 5G',f:'Also fits Poco M6 Pro'},{n:'Redmi Note 7',f:'Also fits Redmi Note 7 Pro'},{n:'Redmi 8',f:'Also fits Redmi 8A / Redmi 8A Dual'},{n:'Redmi 9A',f:'Also fits Redmi 9i'},{n:'Redmi 9C',f:'Also fits Redmi 10A / Poco C3 / Poco C31'},{n:'Redmi 9',f:'Also fits Redmi 9 Prime'},{n:'Redmi Note 10 Pro',f:'Also fits Redmi Note 10 Pro Max'},{n:'Redmi 13C 4G',f:'Also fits Redmi 13C 5G / Poco C65',open:true},{n:'Poco X6 Pro',f:'Also fits Redmi K70e 5G'},{n:'iQOO Z6',f:'Also fits Vivo T1 5G / Vivo Y55 / Vivo Y75 5G'},{n:'Moto G85',f:'Also fits G96 / 50 Fusion'},{n:'Pixel 9',f:'Also fits Pixel 9 Pro',open:true},{n:'Realme C2',f:'Also fits Oppo A3s / Oppo A1K'},{n:'Samsung A12',f:'Also fits M12 / F12 / 4G-5G open type',open:true},{n:'Samsung A13',f:'Also fits A32 5G / M32 5G / 4G-5G open type',open:true},{n:'Samsung M23',f:'Also fits F23'},{n:'Samsung A24 4G',f:'Also fits A25 5G',check:true},{n:'Samsung A52 4G',f:'Also fits A52 5G / A52s 5G'}
];
function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\\]\\]/g,'\\$&')}
function highlight(t,q){if(!q||!t)return t||'';const safe=escapeRegExp(q);return t.replace(new RegExp(safe,'ig'),m=>`<span class="hl">${m}</span>`)}
function render(items,q=''){document.getElementById('list').innerHTML=items.map(m=>`<div class='card'><div class='title'>${highlight(m.n,q)}</div>${m.f?`<div class='fit'>${highlight(m.f,q)}</div>`:''}${m.open||m.check?`<div class='badges'>${m.open?`<span class='badge-open'>OPEN TYPE</span>`:''}${m.check?`<span class='badge-check'>CHECK BEFORE BUY</span>`:''}</div><div class='note'>Verify camera cutout, fingerprint slot, and speaker holes before final use.</div>`:''}</div>`).join('')}
function filterModels(){const q=document.getElementById('searchBox').value.trim().toLowerCase();render(models.filter(m=>(`${m.n} ${m.f||''}`).toLowerCase().includes(q)),q)}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='searchPage'){render(models);setTimeout(()=>document.getElementById('searchBox').focus(),100);}}
render(models);
</script>
</body>
</html>
