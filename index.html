<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>CASE FIT | Smart Finder</title>
<style>
:root {
  --primary: #00f2fe;
  --secondary: #4facfe;
  --bg-dark: #0f172a;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --warning: #ff7675;
  --model-green: #2ecc71;
  --text-dim: #94a3b8;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  background-attachment: fixed;
  color: #f8fafc;
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
}

.wrap { 
  max-width: 430px; 
  margin: 0 auto; 
  padding: 40px 20px;
}

h1 {
  text-align: center;
  font-size: 45px;
  font-weight: 900;
  letter-spacing: -2px;
  background: linear-gradient(to right, #00f2fe, #4facfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-top: 20px;
  margin-bottom: 40px;
}

.btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  color: #fff; text-decoration: none; padding: 20px; border-radius: 22px;
  font-size: 18px; font-weight: 700; margin-bottom: 18px;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(15px); transition: 0.3s;
}

.btn:active { transform: scale(0.97); }

.casebtn { 
  background: linear-gradient(135deg, #05d5ff, #007bff); 
  border: none;
  box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
}

.glassbtn { border-color: #48c7f5; color: #48c7f5; }

.soon-text {
  margin-top: 25px;
  text-align: center;
  opacity: 0.6;
  font-size: 11px;
  letter-spacing: 2px;
  font-weight: 600;
  color: var(--secondary);
}

.search-container { position: sticky; top: 10px; z-index: 100; margin-bottom: 25px; }
.search {
  width: 100%; padding: 18px 24px; border-radius: 20px;
  border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.95);
  color: #fff; font-size: 16px; box-sizing: border-box; outline: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 24px; padding: 22px; margin-bottom: 16px;
}

.title { font-size: 20px; color: var(--model-green); font-weight: 800; margin-bottom: 6px; }
.fit { font-size: 15px; color: #fff; line-height: 1.5; }

.badges { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
.badge { padding: 6px 12px; border-radius: 12px; font-size: 10px; font-weight: 800; }
.badge-open { background: rgba(243, 202, 84, 0.12); color: #f3ca54; border: 1px solid rgba(243, 202, 84, 0.2); }
.badge-check { background: rgba(255, 118, 117, 0.12); color: #ff7675; border: 1px solid rgba(255, 118, 117, 0.2); }

.warning-text { font-size: 12px; color: var(--warning); margin-top: 12px; line-height: 1.4; font-weight: 500; }

.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease-out; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.back {
  display: flex; align-items: center; justify-content: center; color: #fff;
  background: var(--glass); text-decoration: none; width: 48px; height: 48px;
  border-radius: 18px; margin-bottom: 25px; border: 1px solid var(--glass-border);
}

.footer {
  text-align: center;
  padding-top: 40px;
  margin-top: 20px;
  border-top: 1px solid var(--glass-border);
}

.contact-box {
  background: var(--glass);
  padding: 15px 25px;
  border-radius: 20px;
  display: inline-block;
  border: 1px solid var(--glass-border);
}

.contact-box span { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
.contact-box a { color: var(--primary); text-decoration: none; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
.copyright { font-size: 10px; color: #475569; margin-top: 20px; letter-spacing: 1px; }

</style>
</head>
<body>

<div class='wrap'>
  <div id='homePage' class='page active'>
    <h1>CASE FIT</h1>
    <a class='btn casebtn' href='#' onclick="showPage('searchPage');return false;">🔍 Find Suitable Case</a>
    <a class='btn glassbtn' href='#' onclick="showPage('glassPage');return false;">🛡️ Screen Glass</a>
    <div class="soon-text">— MORE MODELS COMING SOON —</div>
    
    <div class="footer">
      <div class="contact-box">
        <span>Need Help / Request Model?</span>
        <a href="mailto:adilpkd690@gmail.com">adilpkd690@gmail.com</a>
      </div>
      <div class="copyright">© 2026 CASE FIT INDIA</div>
    </div>
  </div>

  <div id='searchPage' class='page'>
    <a class='back' href='#' onclick="showPage('homePage');return false;">←</a>
    <div class="search-container">
        <input id='searchBox' class='search' placeholder='Search model...' oninput='filterModels()'>
    </div>
    <div id='list'></div>
  </div>

  <div id='glassPage' class='page'>
    <a class='back' href='#' onclick="showPage('homePage');return false;">←</a>
    <div class='card' style="text-align: center; border-color: var(--secondary);">
      <div class='title' style="color: var(--secondary)">🛡️ SCREEN GLASS</div>
      <p class='fit' style="color: var(--text-dim);">Database updating...</p>
    </div>
  </div>
</div>

<script>
const models = [
    {n:'Redmi M3 / M2', check:true},
    {n:'Redmi 7', f:'Redmi Y3'},
    {n:'Redmi 12 5G', f:'Poco M6 Pro'},
    {n:'Redmi Note 7', f:'Redmi Note 7 Pro'},
    {n:'Redmi 8', f:'Redmi 8A / 8A Dual'},
    {n:'Redmi 9A', f:'Redmi 9i'},
    {n:'Redmi 9C', f:'Redmi 10A / Poco C3 / Poco C31'},
    {n:'Redmi 9', f:'Redmi Prime'},
    {n:'Redmi Note 10 Pro', f:'Note 10 Pro Max'},
    {n:'Redmi Note 10 4G', f:'Note 10s 4G / Note 11se / Poco M5s 4G'},
    {n:'Redmi 11 Prime 5G', f:'Note 11e 5G / 10 Prime Plus 5G'},
    {n:'POCO M4 5G', f:'POCO M5 4G'},
    {n:'Redmi 11X / 11X Pro', f:'Redmi K40 / K40 Pro / K40 Pro+ / Redmi 11i / Poco F3'},
    {n:'Redmi Note 11 Pro 4G/5G', f:'Note 11 Pro+ 5G / Note 12 Pro 4G'},
    {n:'Redmi Note 11s', f:'Note 11 4G'},
    {n:'Redmi Note 11 5G', f:'Poco M4 Pro 5G / Note 11t 5G'},
    {n:'Redmi 13C 4G', f:'Redmi 13C 5G / Poco C65', open:true},
    {n:'Redmi 10C', f:'Redmi 10 4G / Redmi 10 Power / Poco C40'},
    {n:'Redmi Note 14 Pro', f:'14 Pro Plus'},
    {n:'Redmi 6 / 6A', f:'Both models'},
    {n:'Poco X6 Pro', f:'Redmi K70e 5G'},
    {n:'Redmi Y1', f:'Note 5A'},
    {n:'Redmi K20 / K20 Pro', f:'Redmi 9T / 9T Pro'},
    {n:'iQOO Z6', f:'Vivo T1 5G / Vivo Y55 / Vivo Y75 5G'},
    {n:'Vivo Y16', f:'Vi Y56 5G / Y02s 4G / Y35 5G / T2x / iQOO Z7i'},
    {n:'Vivo V40 5G', f:'V40 Pro 5G / Vi T3 Ultra / Vi S19 Pro 5G'},
    {n:'Vivo T1 4G', f:'Vivo Y55 4G / iQOO z6 44w'},
    {n:'Vivo T2 Pro 5G', f:'iQOO z7 pro 5g / vivo S17e'},
    {n:'Moto G85', f:'G96 / 50 Fusion'},
    {n:'Moto G31 / G41', f:'Common fit'},
    {n:'Pixel 9 / 9 Pro', open:true},
    {n:'Pixel 10 / 10 Pro', open:true},
    {n:'Realme C2', f:'Oppo A3s / Oppo A1K'},
    {n:'Realme C55 4G', f:'Narzo N55 4G'},
    {n:'Oppo F27', f:'Reno 12f 4G/5G / Reno 12 Fs 5G'},
    {n:'Oppo F23', f:'Oppo A1 5G / A98'},
    {n:'Oppo A57 4G / 5G', f:'A77 / A77s / A57e / A57s / Narzo 50 5G / V23 / Oneplus N20 se / Nord N300'},
    {n:'Realme C53 / C53e', f:'C51 4G / Narzo N53 / Note 50 4G'},
    {n:'Realme C30 / C30s', f:'Narzo 50i Prime'},
    {n:'Samsung A02 / M02', f:'A022'},
    {n:'Samsung A02s / M02s', f:'Common fit'},
    {n:'Samsung M13 / A04e', f:'Common fit'},
    {n:'Samsung A05 4G', f:'M05 4G / F05 4G'},
    {n:'Samsung F06 5G', f:'M06 5G'},
    {n:'Samsung F14 5G', f:'M14 5G'},
    {n:'Samsung A10 / M10', f:'Common fit'},
    {n:'Samsung A10s / M01s', f:'Common fit'},
    {n:'Samsung A12', f:'M12 / F12 / 4G-5G open type', open:true, check:true},
    {n:'Samsung A13', f:'A32 5G / M32 5G / 4G-5G open type', open:true, check:true},
    {n:'Samsung M23', f:'F23'},
    {n:'Samsung A13 5G', f:'A04s'},
    {n:'Samsung A14 4G/5G', f:'Common fit'},
    {n:'Samsung A22 4G', f:'M32 4G'},
    {n:'Samsung A24 4G', f:'A25 5G', check:true},
    {n:'Samsung A32 4G', f:'M32'},
    {n:'Samsung A52 4G / 5G', f:'A52s 5G'},
    {n:'Samsung A54 4G / 5G', f:'Common fit'},
    {n:'Samsung M21 / M30s', f:'M31 / M21s / M31 Prime / F41'},
    {n:'Samsung F15', f:'M15 5G'},
    {n:'Samsung A50 / A30s / A50s', f:'Common fit'},
    {n:'Samsung A42 / M42', f:'Common fit'}
];

function render(items) {
    const list = document.getElementById('list');
    list.innerHTML = items.map(m => `
    <div class='card'>
        <div class='title'>${m.n}</div>
        ${m.f ? `<div class='fit'>Also fits ${m.f}</div>` : ''}
        ${m.open || m.check ? `<div class='badges'>
            ${m.open ? `<span class='badge badge-open'>OPEN TYPE</span>` : ''}
            ${m.check ? `<span class='badge badge-check'>CHECK BEFORE BUY</span>` : ''}
        </div>` : ''}
        ${m.open ? `<div class='warning-text'>Verify camera cutout, fingerprint slot, and speaker holes before final use.</div>` : ''}
    </div>`).join('');
}

function filterModels() {
    const q = document.getElementById('searchBox').value.toLowerCase().trim();
    const filtered = models.filter(m => 
        m.n.toLowerCase().includes(q) || (m.f && m.f.toLowerCase().includes(q))
    );
    render(filtered);
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
    if(id === 'searchPage') { 
        render(models); 
        setTimeout(() => document.getElementById('searchBox').focus(), 150); 
    }
}
</script>
</body>
</html>
