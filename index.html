<!DOCTYPE html>
<html lang="en">
<head>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CaseFit India",
      "url": "https://casefit-india.vercel.app/",
      "description": "Find perfect mobile cover and screen glass compatibility instantly for Samsung, iPhone, Redmi, Poco, Vivo, Oppo, Realme and more.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://casefit-india.vercel.app/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <title id="meta-title">CaseFit India | Mobile Cover Compatibility Finder</title>
    <meta id="meta-desc" name="description" content="Find perfect mobile cover, back case and screen glass compatibility instantly for Samsung, iPhone, Redmi, Poco, Vivo, Oppo, Realme and Moto." />
    <link id="meta-canonical" rel="canonical" href="https://casefit-india.vercel.app/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="google-site-verification" content="0Yegi8It1AfRKBnGlaUFiWRm9j7wvVjKZXNQa_fvDLo" />
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><text x='50%' y='60%' font-size='45' font-family='sans-serif' font-weight='bold' text-anchor='middle' fill='%2300f2fe'>CF</text></svg>">
    <link rel="manifest" id="manifest-link" />

<style>
:root { --primary: #00f2fe; --secondary: #4facfe; --bg-dark: #0f172a; --glass: rgba(255, 255, 255, 0.05); --glass-active: rgba(0, 242, 254, 0.15); --glass-border: rgba(255, 255, 255, 0.1); --warning: #ff7675; --model-green: #2ecc71; --text-dim: #94a3b8; --share-btn: rgba(37, 211, 102, 0.15); }
body { margin: 0; background: radial-gradient(circle at top, #1e293b, #0f172a); background-attachment: fixed; color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
.wrap { max-width: 430px; margin: 0 auto; padding: 30px 20px 40px; }
.logo-container { text-align: center; margin: 20px 0 35px; }
.btn { display: flex; align-items: center; justify-content: center; gap: 12px; color: #fff; text-decoration: none; padding: 20px; border-radius: 22px; font-size: 18px; font-weight: 700; margin-bottom: 15px; background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(15px); transition: 0.3s; cursor: pointer; }
.casebtn { background: linear-gradient(135deg, #05d5ff, #007bff); border: none; box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3); }
.glassbtn { border-color: rgba(72, 199, 245, 0.5); color: #48c7f5; }
.sticky-header { position: sticky; top: 10px; z-index: 100; margin-bottom: 15px; }
.search-wrapper { position: relative; width: 100%; }
.search { width: 100%; padding: 18px 50px 18px 24px; border-radius: 20px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.95); color: #fff; font-size: 16px; box-sizing: border-box; outline: none; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
.mic-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; color: var(--primary); cursor: pointer; }
.result-count { font-size: 12px; color: var(--secondary); margin: 10px 0 5px 5px; font-weight: 600; }
.chip { padding: 8px 16px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--text-dim); white-space: nowrap; cursor: pointer; transition: 0.2s; }
.chip.active { background: var(--glass-active); color: var(--primary); border-color: var(--primary); }
.card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 22px; margin-bottom: 16px; position: relative; }
.title { font-size: 20px; color: var(--model-green); font-weight: 800; margin-bottom: 6px; }
.fit { font-size: 15px; color: #fff; line-height: 1.5; opacity: 0.95; }
.badge { padding: 6px 12px; border-radius: 12px; font-size: 10px; font-weight: 800; display: inline-block; margin-top: 10px; margin-right: 5px; }
.badge-open { background: rgba(243, 202, 84, 0.1); color: #f3ca54; border: 1px solid rgba(243, 202, 84, 0.3); }
.badge-check { background: rgba(255, 118, 117, 0.1); color: #ff7675; border: 1px solid rgba(255, 118, 117, 0.3); }
.share-action { margin-top: 15px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #2ecc71; background: var(--share-btn); padding: 8px 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.back { display: flex; align-items: center; justify-content: center; color: #fff; background: var(--glass); text-decoration: none; width: 48px; height: 48px; border-radius: 18px; margin-bottom: 15px; border: 1px solid var(--glass-border); cursor: pointer; }
.no-result { text-align: center; padding: 30px 15px; background: var(--glass); border-radius: 24px; border: 1px dashed var(--glass-border); }
.req-btn { background: #ea4335; color: white; text-decoration: none; padding: 12px 20px; border-radius: 14px; font-size: 14px; font-weight: 700; display: inline-block; margin-top: 15px; }
.warning-badge { background: rgba(255, 118, 117, 0.1); color: #ff7675; padding: 10px 20px; border-radius: 12px; font-size: 11px; font-weight: 800; border: 1px solid rgba(255, 118, 117, 0.3); display: inline-block; margin-top: 20px; }
</style>
</head>
<body>
<div class='wrap'>
  <div id='homePage' class='page active'>
    <div class="logo-container">
      <svg width="250" height="60" viewBox="0 0 250 60">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00f2fe"/><stop offset="100%" stop-color="#4facfe"/></linearGradient></defs>
        <g transform="translate(10, 8)"><rect width="26" height="42" rx="7" fill="none" stroke="url(#g)" stroke-width="3"/><path d="M 8 20 L 14 26 L 30 10" fill="none" stroke="#2ecc71" stroke-width="3.5" stroke-linecap="round"/></g>
        <text x="45" y="42" font-family="sans-serif" font-weight="900" font-size="30" fill="url(#g)" letter-spacing="-1">CaseFit</text>
      </svg>
    </div>
    <a href="#" class='btn casebtn' onclick="showPage('searchPage'); return false;">🔍 Find Suitable Case</a>
    <a href="#" class='btn glassbtn' onclick="showPage('glassPage'); return false;">🛡️ Screen Glass</a>
    <a href="#" id='installBtn' class='btn' style="display:none;" onclick="handleInstall(); return false;">⬇️ Install App</a>
    <div style="text-align:center; margin-top:30px; font-size:11px; color:var(--secondary); letter-spacing:2px; font-weight:700;">— CASEFIT INDIA —</div>
  </div>

  <div id='searchPage' class='page'>
    <a href="#" class='back' onclick="showPage('homePage'); return false;">←</a>
    <div class="sticky-header">
        <div class="search-wrapper">
            <input id='searchBox' class='search' placeholder='Search cover model...' oninput='handleSearchInput()'>
            <button class="mic-btn" onclick="startVoiceSearch()">🎤</button>
        </div>
        <div class="filter-scroll" id="brandChips" style="margin-top: 15px;">
            <div class="chip active" onclick="setBrand('All', this)">All</div>
            <div class="chip" onclick="setBrand('Samsung', this)">Samsung</div>
            <div class="chip" onclick="setBrand('Redmi', this)">Redmi/Poco</div>
            <div class="chip" onclick="setBrand('iPhone', this)">Apple</div>
            <div class="chip" onclick="setBrand('Vivo', this)">Vivo/iQOO</div>
            <div class="chip" onclick="setBrand('Oppo', this)">Oppo/Realme</div>
            <div class="chip" onclick="setBrand('Moto', this)">Moto</div>
        </div>
        <div id="resultCount" class="result-count"></div>
    </div>
    <div id='list'></div>
  </div>

  <div id='glassPage' class='page'>
    <a href="#" class='back' onclick="showPage('homePage'); return false;">←</a>
    <div class="sticky-header">
        <div class="search-wrapper">
            <input id='glassSearchBox' class='search' placeholder='Search glass model...' oninput='handleGlassSearch()'>
        </div>
        <div id="glassResultCount" class="result-count"></div>
    </div>
    <div id='glassList'></div>
    <div style="text-align: center;">
        <div class="warning-badge">⚠️ MORE MODELS ADDING SOON</div>
    </div>
  </div>
</div>
<script>
let databaseModels = [];
let glassModels = [];
let currentBrand = 'All';
let searchTimeout;

// FETCH DATA & COUNT LOGIC
Promise.all([
    fetch('models.json').then(r => r.json()).catch(() => []),
    fetch('glass.json').then(r => r.json()).catch(() => [])
]).then(([cases, glass]) => {
    databaseModels = cases;
    glassModels = glass;
    
    const getRealCount = (db) => {
        let count = 0;
        db.forEach(m => {
            const names = m.n.split(/[/,-]/).filter(x => x.trim().length > 0);
            const fits = m.f ? m.f.split(/[/,-]/).filter(x => x.trim().length > 0) : [];
            count += (names.length + fits.length);
        });
        return count;
    };

    document.getElementById('resultCount').innerText = `Verified ${getRealCount(databaseModels)}+ models`;
    document.getElementById('glassResultCount').innerText = `Verified ${getRealCount(glassModels)}+ screen glasses`;

    const q = new URLSearchParams(window.location.search).get('search');
    if(q) { showPage('searchPage'); document.getElementById('searchBox').value = q; filterModels(); }
});

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
    if(id === 'searchPage') { 
        document.getElementById('searchBox').value = ''; 
        filterModels(); 
        setTimeout(() => document.getElementById('searchBox').focus(), 350); 
    }
    if(id === 'glassPage') { 
        document.getElementById('glassSearchBox').value = ''; 
        handleGlassSearch(); 
        setTimeout(() => document.getElementById('glassSearchBox').focus(), 350); 
    }
}

function handleSearchInput() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => filterModels(), 250);
}

function handleGlassSearch() {
    const q = document.getElementById('glassSearchBox').value.toLowerCase().trim();
    const filtered = glassModels.filter(m => m.n.toLowerCase().includes(q) || (m.f && m.f.toLowerCase().includes(q)));
    render(document.getElementById('glassList'), filtered, q, "Glass");
}

function filterModels() {
    const q = document.getElementById('searchBox').value.toLowerCase().trim();
    let filtered = databaseModels.filter(m => {
        const nL = m.n.toLowerCase();
        if (currentBrand !== 'All') {
            if (currentBrand === 'Redmi' && !(nL.includes('redmi') || nL.includes('poco'))) return false;
            if (currentBrand === 'Samsung' && !nL.includes('samsung')) return false;
            if (currentBrand === 'iPhone' && !nL.includes('iphone')) return false;
            if (currentBrand === 'Vivo' && !(nL.includes('vivo') || nL.includes('iqoo'))) return false;
            if (currentBrand === 'Oppo' && !(nL.includes('oppo') || nL.includes('realme'))) return false;
            if (currentBrand === 'Moto' && !nL.includes('moto')) return false;
        }
        return !q || nL.includes(q) || (m.f && m.f.toLowerCase().includes(q));
    });
    render(document.getElementById('list'), filtered, q, "Cover");
}

function render(container, items, q, type) {
    if (items.length === 0 && q !== '') {
        container.innerHTML = `<div class="no-result"><h3>📦 No Results</h3><a href="mailto:adilpkd690@gmail.com?subject=${type} Request: ${q}" class="req-btn">📧 Request via Gmail</a></div>`;
        return;
    }
    container.innerHTML = items.map(m => `
    <div class='card'>
        <div class='title'>${m.n}</div>
        <div class='fit'>${m.f ? 'Also fits ' + m.f : 'Exact fit only'}</div>
        ${m.open ? `<span class='badge badge-open'>OPEN TYPE</span>` : ''}
        ${m.check ? `<span class='badge badge-check'>CHECK BEFORE BUY</span>` : ''}
        <div class="share-action" onclick="shareResult('${m.n}')">🔗 Share Result</div>
    </div>`).join('');
}

function setBrand(brand, el) {
    currentBrand = brand;
    document.querySelectorAll('#brandChips .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    filterModels();
}

function startVoiceSearch() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Speech) {
        const rec = new Speech();
        rec.onresult = (e) => { document.getElementById('searchBox').value = e.results[0][0].transcript; filterModels(); };
        rec.start();
    }
}

function shareResult(n) {
    const url = window.location.origin + "/?search=" + encodeURIComponent(n);
    if (navigator.share) navigator.share({ title: 'CaseFit India', url: url });
}
</script>
</body>
</html>
