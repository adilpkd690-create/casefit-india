<!DOCTYPE html><html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CaseFit India</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#020617,#0f172a,#1e293b,#312e81);
      color:white;
      padding:20px;
      min-height:100vh;
    }
    .hero{
      position:relative;
      overflow:hidden;
      text-align:center;
      padding:40px 20px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      backdrop-filter:blur(12px);
      box-shadow:0 25px 60px rgba(0,0,0,0.45);
      margin-bottom:20px;
    }
    .hero h1{font-size:42px;margin:0;}
    .hero p{color:#cbd5e1;margin-top:10px;}
    .search-wrap{
      display:grid;
      gap:12px;
      margin:20px 0;
    }
    select,input{
      width:100%;padding:14px;border:none;border-radius:14px;
      background:rgba(255,255,255,0.08);color:white;font-size:16px;
      outline:none;
    }
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:bold;margin-top:10px;}
    .badge-open{background:rgba(245,158,11,0.18);border:1px solid rgba(245,158,11,0.35);color:#fcd34d;}
    .badge-confusion{background:rgba(239,68,68,0.16);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;}
    .note{margin-top:8px;font-size:12px;color:#fca5a5;}background:rgba(245,158,11,0.18);border:1px solid rgba(245,158,11,0.35);color:#fcd34d;}
    .model-redmi{border-left:4px solid #f97316;}
    .model-vivo{border-left:4px solid #3b82f6;}
    .model-samsung{border-left:4px solid #22c55e;}
    .model-realme{border-left:4px solid #a855f7;}
    .model-redmi h3{color:#fb923c;}
    .model-vivo h3{color:#60a5fa;}
    .model-samsung h3{color:#4ade80;}
    .model-realme h3{color:#c084fc;}
    .model-moto h3{color:#fde047;}
    .model-pixel h3{color:#f9a8d4;}
    .model-moto{border-left:4px solid #eab308;}
    .model-pixel{border-left:4px solid #ec4899;}
    .highlight{color:#facc15;font-weight:bold;}
    .card{
      backdrop-filter:blur(10px);
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.08);
      padding:18px;border-radius:18px;margin-top:15px;
      box-shadow:0 14px 34px rgba(0,0,0,0.28);
      transition:transform .2s ease;
    }
    .card:hover{transform:translateY(-2px);}
    .info-box{
      box-shadow:0 10px 25px rgba(0,0,0,0.18);
      margin-top:24px;padding:16px;border-radius:16px;
      background:rgba(255,255,255,0.06);color:#cbd5e1;
      border:1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>📱 Case Compatibility Checker</h1>
    <p>Choose your phone brand and quickly find same-fit compatible case models.</p>
  </div>  <div id="brandList" class="search-wrap"></div>
  <div id="modelSection" style="display:none;">
    <input id="search" placeholder="Search selected brand model..." oninput="searchPhones()"/>
    <div id="results"></div>
  </div>  <div class="info-box">
    📱 Case compatibility list is updated regularly with new verified models.<br><br>
    📩 Contact: adilpkd690@gmail.com
  </div>  <script>
    const phones = [
      { brand:"Redmi", model:"Redmi 7", fit:"Also fits Redmi Y3" },
      { brand:"Redmi", model:"Redmi 12 5G", fit:"Also fits Poco M6 Pro" },
      { brand:"Redmi", model:"Redmi Note 7", fit:"Also fits Redmi Note 7 Pro" },
      { brand:"Redmi", model:"Redmi 8", fit:"Also fits Redmi 8A / 8A Dual" },
      { brand:"Redmi", model:"Redmi 9A", fit:"Also fits Redmi 9i" },
      { brand:"Redmi", model:"Redmi 9C", fit:"Also fits Redmi 10A / Poco C3 / Poco C31" },
      { brand:"Redmi", model:"Redmi 9", fit:"Also fits Redmi 9 Prime / Poco M2" },
      { brand:"Redmi", model:"Redmi Note 10 Pro", fit:"Also fits Redmi Note 10 Pro Max" },
      { brand:"Redmi", model:"Redmi Note 10 4G", fit:"Also fits Note 10S / Note 11SE / Poco M5S" },
      { brand:"Redmi", model:"Redmi 11 Prime 5G", fit:"Also fits Redmi Note 11E 5G / Redmi 10 Prime Plus 5G" },
      { brand:"Redmi", model:"POCO M4 5G", fit:"Also fits POCO M5 4G" },
      { brand:"Redmi", model:"Redmi 11X", fit:"Also fits 11X Pro / Redmi K40 / K40 Pro / K40 Pro Plus / Redmi 11i / Poco F3" },
      { brand:"Redmi", model:"Redmi Note 11 Pro", fit:"Also fits 4G / 5G / Note 11 Pro Plus 5G / Note 12 Pro 4G" },
      { brand:"Redmi", model:"Redmi Note 11S", fit:"Also fits Note 11 4G" },
      { brand:"Redmi", model:"Redmi Note 11 5G", fit:"Also fits Poco M4 Pro 5G / Note 11T 5G" },
      { brand:"Redmi", model:"Redmi 13C 4G", fit:"Also fits Redmi 13C 5G open type / Poco C65" },
      { brand:"Redmi", model:"Redmi 10C", fit:"Also fits Redmi 10 4G / Redmi 10 Power / Poco C40" },
      { brand:"Redmi", model:"Redmi Note 14 Pro", fit:"Also fits 14 Pro Plus" },
      { brand:"Redmi", model:"Redmi 6", fit:"Also fits 6A" },
      { brand:"Redmi", model:"Poco X6 Pro", fit:"Also fits Redmi K70E 5G" },
      { brand:"Redmi", model:"Redmi Y1", fit:"Also fits Note 5A" },
      { brand:"Redmi", model:"Redmi K20", fit:"Also fits K20 Pro / Redmi 9T / 9T Pro" },

      { brand:"Vivo", model:"iQOO Z6", fit:"Also fits Vivo T1 5G / Vivo Y55 / Vivo Y75 5G" },
      { brand:"Vivo", model:"iQOO Z3", fit:"Also fits Vivo Y72 5G" },
      { brand:"Vivo", model:"iQOO Neo 7", fit:"Also fits Neo 7 Pro" },
      { brand:"Vivo", model:"Vivo Y04", fit:"Also fits Y19e / Y29s 5G / T4 Lite 5G / Y19 5G / iQOO Z10 Lite 5G" },
      { brand:"Vivo", model:"Vivo Y16", fit:"Also fits Y56 5G / Y02s 4G / Y35 5G / T2x / iQOO Z7i" },
      { brand:"Vivo", model:"Vivo V40 5G", fit:"Also fits V40 Pro 5G / T3 Ultra / S19 Pro 5G" },
      { brand:"Vivo", model:"Vivo T1 4G", fit:"Also fits Vivo Y55 4G / iQOO Z6 44W" },
      { brand:"Vivo", model:"Vivo T2 Pro 5G", fit:"Also fits iQOO Z7 Pro 5G / Vivo S17e" },
      { brand:"Vivo", model:"Vivo T4x", fit:"Also fits Y29 4G / Y31 Pro 5G / iQOO Z10x" },

      { brand:"Moto", model:"Moto G85", fit:"Also fits G96 / 50 Fusion" },
      { brand:"Moto", model:"Moto G31", fit:"Also fits G41" },

      { brand:"Pixel", model:"Pixel 9", fit:"Also fits Pixel 9 Pro open type" },
      { brand:"Pixel", model:"Pixel 10", fit:"Also fits Pixel 10 Pro open type" },

      { brand:"Realme", model:"Realme C2", fit:"Also fits Oppo A3s / Oppo A1k" },
      { brand:"Realme", model:"Realme C55 4G", fit:"Also fits Realme Narzo N55 4G" },
      { brand:"Realme", model:"Oppo F27", fit:"Also fits Oppo Reno 12F 4G/5G / Reno 12 FS 5G" },
      { brand:"Realme", model:"Oppo F23", fit:"Also fits Oppo A1 5G / A98" },

      { brand:"Samsung", model:"Samsung A02", fit:"Also fits M02 / A022" },
      { brand:"Samsung", model:"Samsung A02s", fit:"Also fits M02s / A02s" },
      { brand:"Samsung", model:"Samsung M13", fit:"Also fits A04e" },
      { brand:"Samsung", model:"Samsung A05 4G", fit:"Also fits M05 4G / F05 4G" },
      { brand:"Samsung", model:"Samsung F06 5G", fit:"Also fits M06 5G" },
      { brand:"Samsung", model:"Samsung F14 5G", fit:"Also fits M14" },
      { brand:"Samsung", model:"Samsung A10", fit:"Also fits M10" },
      { brand:"Samsung", model:"Samsung A10s", fit:"Also fits M01s" },
      { brand:"Samsung", model:"Samsung A11", fit:"Also fits M11" },
      { brand:"Samsung", model:"Samsung A12", fit:"Also fits M12 / F12 / 4G-5G open type" },
      { brand:"Samsung", model:"Samsung A13", fit:"Also fits A32 5G / M32 5G / 4G-5G open type" },
      { brand:"Samsung", model:"Samsung M23", fit:"Also fits F23" },
      { brand:"Samsung", model:"Samsung A13 5G", fit:"Also fits A04s" },
      { brand:"Samsung", model:"Samsung A14", fit:"Also fits 4G / 5G" },
      { brand:"Samsung", model:"Samsung M16 5G", fit:"Also fits F16 5G" },
      { brand:"Samsung", model:"Samsung A20", fit:"Also fits A30 / M10s" },
      { brand:"Samsung", model:"Samsung A22 4G", fit:"Also fits M32 4G" },
      { brand:"Samsung", model:"Samsung A22 5G", fit:"Also fits A22s 5G / F42 5G" },
      { brand:"Samsung", model:"Samsung A24 4G", fit:"Also fits A25 5G" }
    ];

    let selectedBrand = "";
    const brands = [...new Set(phones.map(p => p.brand))];

    function renderBrands(){
      const box = document.getElementById('brandList');
      box.innerHTML = brands.map(b => `
        <div class="card model-${b.toLowerCase()}" onclick="selectBrand('${b}')" style="cursor:pointer;text-align:center;font-weight:bold;">
          ${b}
        </div>
      `).join('');
    }

    function selectBrand(brand){
      selectedBrand = brand;
      document.getElementById('modelSection').style.display = 'block';
      document.getElementById('search').value = '';
      searchPhones();
      window.scrollTo({top: document.getElementById('modelSection').offsetTop - 20, behavior:'smooth'});
    }

    function searchPhones(){
      const q = document.getElementById('search').value.toLowerCase();
      const results = document.getElementById('results');
      results.innerHTML = '';

      phones
        .filter(p => p.brand === selectedBrand && (p.model.toLowerCase().includes(q) || p.fit.toLowerCase().includes(q)))
        .forEach(phone => {
          const isOpen = phone.fit.toLowerCase().includes('open type');
          const risky = isOpen || /4g.*5g|5g.*4g|shared/i.test(phone.fit);
          const badge = isOpen ? '<div class="badge badge-open">OPEN TYPE</div>' : '';
          const confusion = risky ? '<div class="badge badge-confusion">CHECK BEFORE BUY</div><div class="note">Verify camera cutout, fingerprint slot, and speaker holes before final use.</div>' : '';
          const cls = 'model-' + phone.brand.toLowerCase();
          const modelText = q ? phone.model.replace(new RegExp(q, 'ig'), m => `<span class="highlight">${m}</span>`) : phone.model;
          const cleanFit = phone.fit.replace(/\s*open type/ig, '');
          const fitText = q ? cleanFit.replace(new RegExp(q, 'ig'), m => `<span class="highlight">${m}</span>`) : cleanFit;
          results.innerHTML += `
            <div class="card ${cls}">
              <h3>${modelText}</h3>
              <p>${fitText}</p>
              ${badge}
              ${confusion}
            </div>
          `;
        });
    }

    renderBrands();
  </script></body>
</html>
