<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f172a" />
<title>CoverMatch | Smart Finder</title>

<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><text x='50%' y='60%' font-size='45' font-family='sans-serif' font-weight='bold' text-anchor='middle' fill='%2300f2fe'>CM</text></svg>">
<meta name="description" content="CoverMatch India - Find the perfect smartphone case compatibility. Smart finder for shop staff." />

<link rel="manifest" id="manifest-link" />

<style>
:root {
  --primary: #00f2fe; --secondary: #4facfe; --bg-dark: #0f172a;
  --glass: rgba(255, 255, 255, 0.05); --glass-active: rgba(0, 242, 254, 0.15);
  --glass-border: rgba(255, 255, 255, 0.1); --warning: #ff7675;
  --model-green: #2ecc71; --text-dim: #94a3b8; --share-btn: rgba(37, 211, 102, 0.15);
}

body {
  margin: 0; background: radial-gradient(circle at top, #1e293b, #0f172a);
  background-attachment: fixed; color: #f8fafc;
  font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; overflow-x: hidden;
}

.wrap { max-width: 430px; margin: 0 auto; padding: 30px 20px 40px; }

.logo-container { text-align: center; margin: 20px 0 35px; }

.btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  color: #fff; text-decoration: none; padding: 20px; border-radius: 22px;
  font-size: 18px; font-weight: 700; margin-bottom: 15px;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(15px); transition: 0.3s; cursor: pointer;
}

.btn:active { transform: scale(0.97); }
.casebtn { background: linear-gradient(135deg, #05d5ff, #007bff); border: none; box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3); }
.glassbtn { border-color: rgba(72, 199, 245, 0.5); color: #48c7f5; }

/* Smart Install Button */
#installBtn {
  display: flex; background: rgba(46, 204, 113, 0.15); border-color: rgba(46, 204, 113, 0.4);
  color: #2ecc71; font-size: 16px; padding: 16px; margin-top: 5px;
}

@keyframes softPulse {
  0%, 100% { opacity: 0.5; } 50% { opacity: 1; }
}
.pulse-text {
  margin-top: 25px; text-align: center; font-size: 11px; letter-spacing: 2px;
  font-weight: 700; color: var(--secondary); animation: softPulse 3s infinite ease-in-out;
}

.sticky-header { position: sticky; top: 10px; z-index: 100; margin-bottom: 15px; }
.search-wrapper { position: relative; width: 100%; }
.search {
  width: 100%; padding: 18px 50px 18px 24px; border-radius: 20px;
  border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.95);
  color: #fff; font-size: 16px; box-sizing: border-box; outline: none;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4); transition: border-color 0.3s;
}
.search:focus { border-color: var(--primary); }
.mic-btn {
  position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
  background: none; border: none; font-size: 20px; color: var(--primary); cursor: pointer;
}

.result-count { font-size: 12px; color: var(--secondary); margin: 10px 0 5px 5px; font-weight: 600; }
.filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 10px; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.chip {
  padding: 8px 16px; background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--text-dim);
  white-space: nowrap; cursor: pointer; transition: 0.2s; backdrop-filter: blur(10px);
}
.chip.active { background: var(--glass-active); color: var(--primary); border-color: var(--primary); }

.card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 22px; margin-bottom: 16px; position: relative; }
.title { font-size: 20px; color: var(--model-green); font-weight: 800; margin-bottom: 6px; }
.fit { font-size: 15px; color: #fff; line-height: 1.5; opacity: 0.95; }
mark { background-color: rgba(0, 242, 254, 0.25); color: #fff; border-radius: 4px; padding: 0 2px; }

.share-action { margin-top: 15px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #2ecc71; background: var(--share-btn); padding: 8px 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }

.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.back { display: flex; align-items: center; justify-content: center; color: #fff; background: var(--glass); text-decoration: none; width: 48px; height: 48px; border-radius: 18px; margin-bottom: 15px; border: 1px solid var(--glass-border); }

.no-result { text-align: center; padding: 30px 15px; background: var(--glass); border-radius: 24px; border: 1px dashed var(--glass-border); }
.req-btn { background: rgba(0, 242, 254, 0.1); color: var(--primary); text-decoration: none; padding: 12px 20px; border-radius: 14px; font-size: 14px; font-weight: 700; display: inline-block; border: 1px solid rgba(0,242,254,0.3); margin-top: 10px;}

.footer { text-align: center; padding-top: 40px; margin-top: 20px; border-top: 1px solid var(--glass-border); }
</style>
</head>
<body>

<div class='wrap'>
  <div id='homePage' class='page active'>
    <div class="logo-container">
      <svg width="250" height="60" viewBox="0 0 250 60" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00f2fe" /><stop offset="100%" stop-color="#4facfe" /></linearGradient>
        </defs>
        <g transform="translate(10, 8)">
          <rect x="0" y="0" width="26" height="42" rx="7" fill="none" stroke="url(#logoGrad)" stroke-width="3"/>
          <path d="M 8 20 L 14 26 L 30 10" fill="none" stroke="#2ecc71" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
        </g>
        <text x="45" y="42" font-family="sans-serif" font-weight="900" font-size="30" fill="url(#logoGrad)" letter-spacing="-1">CoverMatch</text>
      </svg>
    </div>

    <div class='btn casebtn' onclick="showPage('searchPage')">🔍 Find Suitable Case</div>
    <div class='btn glassbtn' onclick="showPage('glassPage')">🛡️ Screen Glass</div>
    <div id='installBtn' class='btn' onclick="handleInstall()">⬇️ Install App</div>
    
    <div class="pulse-text">— DATABASE UPDATED TODAY —</div>
    
    <div class="footer">
      <div style="font-size: 13px; color: var(--text-dim);">
        Need Help / Request Models?<br>
        <a href="mailto:adilpkd690@gmail.com" style="color: var(--primary); text-decoration:none; font-weight:700;">adilpkd690@gmail.com</a>
      </div>
      <p style="font-size: 10px; color: #475569; margin-top: 20px;">© 2026 CoverMatch India</p>
    </div>
  </div>

  <div id='searchPage' class='page'>
    <div class='back' onclick="showPage('homePage')">←</div>
    
    <div class="sticky-header">
        <div class="search-wrapper">
            <input id='searchBox' class='search' placeholder='Search model...' oninput='filterModels()'>
            <button class="mic-btn" onclick="startVoiceSearch()">🎤</button>
        </div>
        
        <div class="filter-scroll" id="searchChips">
            <div class="chip active" onclick="setBrand('All', this)">All</div>
            <div class="chip" onclick="setBrand('Samsung', this)">Samsung</div>
            <div class="chip" onclick="setBrand('Redmi', this)">Redmi/Poco</div>
            <div class="chip" onclick="setBrand('iPhone', this)">Apple</div>
            <div class="chip" onclick="setBrand('Vivo', this)">Vivo/iQOO</div>
            <div class="chip" onclick="setBrand('Oppo', this)">Oppo/Realme</div>
            <div class="chip" onclick="setBrand('Moto', this)">Moto</div>
        </div>
        
        <div id="resultCount" class="result-count">Loading models...</div>
    </div>
    
    <div id='list'></div>
  </div>

  <div id='glassPage' class='page'>
    <div class='back' onclick="showPage('homePage')">←</div>
    <div class='card' style="text-align:center;">
      <h3 style="color:var(--secondary)">🛡️ SCREEN GLASS</h3>
      <p style="font-size:14px; color:var(--text-dim)">Smart compatibility engine launching soon.</p>
    </div>
  </div>
</div>

<script>
let databaseModels = [];
let currentBrand = 'All';

// 1. Fetching Data with Root Path Safety
fetch('models.json')
    .then(r => r.json())
    .then(data => {
        databaseModels = data;
        if(document.getElementById('searchPage').classList.contains('active')) filterModels();
        else updateCount(`Total ${data.length} models ready`);
    })
    .catch(e => updateCount("⚠️ Error loading database"));

function updateCount(txt) { document.getElementById('resultCount').innerText = txt; }

function quickSearch(q) {
    document.getElementById('searchBox').value = q;
    filterModels();
}

function startVoiceSearch() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Speech) {
        const rec = new Speech();
        rec.lang = 'en-IN'; // Indian English/Accent support
        rec.onresult = (e) => quickSearch(e.results[0][0].transcript);
        rec.start();
    }
}

function shareResult(n, f) {
    const site = window.location.href;
    const txt = `📱 Model: *${n}*\n✅ Also fits: ${f || 'Exact fit'}\n🛡️ Verified on CoverMatch\n\nCheck: ${site}`;
    if (navigator.share) navigator.share({ text: txt });
}

function filterModels() {
    if (databaseModels.length === 0) return; // Point 3 logic
    
    const box = document.getElementById('searchBox');
    const q = box.value.toLowerCase().replace(/\s+/g, ' ').trim(); // Point 2 logic
    
    let filtered = databaseModels.filter(m => {
        const nL = m.n.toLowerCase();
        if (currentBrand !== 'All') {
            if (currentBrand === 'Redmi' && !(nL.includes('redmi') || nL.includes('poco'))) return false;
            if (currentBrand === 'Samsung' && !nL.includes('samsung')) return false;
            if (currentBrand === 'iPhone' && !nL.includes('iphone')) return false;
            if (currentBrand === 'Vivo' && !(nL.includes('vivo') || nL.includes('iqoo'))) return false;
            if (currentBrand === 'Oppo' && !(nL.includes('oppo') || nL.includes('realme'))) return false;
            if (currentBrand === 'Moto' && !nL.includes('moto')) return false;
        }
        return !q || nL.includes(q) || (m.f && m.f.toLowerCase().includes(q));
    });

    render(filtered, q);
}

function render(items, q) {
    const list = document.getElementById('list');
    updateCount(`Showing ${items.length} models`);

    if (items.length === 0) {
        list.innerHTML = `
        <div class="no-result">
            <h3>📦 No Match</h3>
            <p>Try searching: </p>
            <div class="filter-scroll" style="justify-content:center">
                <div class="chip" onclick="quickSearch('A24')">A24</div>
                <div class="chip" onclick="quickSearch('Redmi 13C')">13C</div>
                <div class="chip" onclick="quickSearch('iPhone 13')">iPh 13</div>
            </div>
            <a href="mailto:adilpkd690@gmail.com?subject=Model Request: ${q}" class="req-btn">📧 Request Model</a>
        </div>`;
        return;
    }

    list.innerHTML = items.map(m => `
    <div class='card'>
        <div class='title'>${m.n}</div>
        <div class='fit'>${m.f ? 'Fits ' + m.f : 'Exact fit only'}</div>
        <div class="share-action" onclick="shareResult('${m.n}', '${m.f || ''}')"><span>🔗 Share Result</span></div>
    </div>`).join('');
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
    if(id === 'searchPage') {
        document.getElementById('searchBox').value = '';
        currentBrand = 'All';
        document.querySelectorAll('#searchChips .chip').forEach(c => c.classList.remove('active'));
        document.querySelector('#searchChips .chip').classList.add('active');
        filterModels();
        setTimeout(() => document.getElementById('searchBox').focus(), 350);
    }
}

function setBrand(b, el) {
    currentBrand = b;
    document.querySelectorAll('#searchChips .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    filterModels();
}

// Smart Install Logic (Point 8)
let defP;
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); defP = e; });
if (window.matchMedia('(display-mode: standalone)').matches) {
    document.getElementById('installBtn').style.display = 'none';
}

function handleInstall() {
    if (defP) {
        defP.prompt();
    } else {
        alert("To install: Tap 'Share' and 'Add to Home Screen'");
    }
}
</script>
</body>
</html>
