  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#020617;color:#fff}
    .page{min-height:100vh;padding:24px;display:none}
    .active{display:block}
    h1{font-size:56px;text-align:center;margin:30px 0}
    .btn,.card{display:block;width:100%;box-sizing:border-box;padding:20px;border-radius:24px;text-decoration:none;margin:16px 0}
    .btn{font-size:32px;font-weight:700;text-align:center;color:#000}
    .green{background:#22c55e}.cyan{background:#22d3ee}
    .glow{border:2px solid #fbbf24;color:#fbbf24;text-align:center;font-size:34px;animation:pulse 1s infinite}
    .contact{border:1px solid #334155;border-radius:24px;padding:20px;margin-top:40px;position:fixed;left:24px;right:24px;bottom:24px;background:#020617}
    .mail{background:#38bdf8;color:#000;padding:16px;border-radius:18px;text-align:center;font-weight:700}
    input{width:100%;padding:18px;border-radius:18px;background:#0f172a;color:#fff;border:1px solid #334155;font-size:24px;box-sizing:border-box}
    .result{background:#1e293b;border:1px solid #334155;border-radius:24px;padding:18px;font-size:22px;margin:14px 0}
    .back{display:inline-block;background:#22c55e;color:#000;padding:14px 20px;border-radius:18px;text-decoration:none;font-weight:700;margin-bottom:20px}
    .yellow{color:#facc15;font-weight:700}
    .warn{color:#fb923c;font-weight:700}
    @keyframes pulse{50%{opacity:.5}}
  </style>
</head>
<body>
  <div id="home" class="page active">
    <h1>Case Fit</h1>

    <div class="contact">
      <div>📞 Contact</div>
      <div class="mail">adilpkd690@gmail.com</div>
    </div>

  </div>  <div id="glass" class="page">

function showPage(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id==='search') renderModels(models);
}

function renderModels(list, query=''){
 const q = query.toLowerCase();
 document.getElementById('results').innerHTML = list.map(m=>{
   let text = m;
   if(q){
     const safe = q.replace(/[.*+?^${}()|[\]\]/g,'\$&');
     text = text.replace(new RegExp(safe,'ig'), match => `<span class="yellow">${match}</span>`);
   }
   text = text.replace(/OPEN TYPE/gi,'<span class="yellow">OPEN TYPE</span>');
   text = text.replace(/⚠ CHECK BEFORE BUY/gi,'<span class="warn">⚠ CHECK BEFORE BUY</span>');
   return `<div class="result">• ${text}</div>`;
 }).join('');
}

function filterModels(){
 const q=document.getElementById('searchBox').value.toLowerCase();
 renderModels(models.filter(m=>m.toLowerCase().includes(q)), q);
}

renderModels(models);
</script></body>
