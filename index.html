<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CaseFit India</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
      color:white;
      padding:20px;
      min-height:100vh;
    }
    .hero{
      text-align:center;
      padding:40px 20px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      backdrop-filter:blur(12px);
      box-shadow:0 20px 50px rgba(0,0,0,0.35);
      margin-bottom:20px;
    }
    .hero h1{font-size:42px;margin:0;}
    .hero p{color:#cbd5e1;margin-top:10px;}
    .search-wrap{
      display:grid;
      gap:12px;
      margin:20px 0;
    }
    select,input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,0.08);
      color:white;
      font-size:16px;
      outline:none;
    }
    .card{
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.08);
      padding:18px;
      border-radius:18px;
      margin-top:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }
    .info-box{
      margin-top:24px;
      padding:16px;
      border-radius:16px;
      background:rgba(255,255,255,0.06);
      color:#cbd5e1;
      border:1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>📱 CaseFit India</h1>
    <p>Find exact same-fit mobile cases with a premium brand-wise compatibility explorer</p>
  </div>

  <div class="search-wrap">
    <select id="brand" onchange="searchPhones()">
      <option value="">All Brands</option>
      <option value="Redmi">Redmi</option>
      <option value="Vivo">Vivo</option>
      <option value="Samsung">Samsung</option>
      <option value="Moto">Moto</option>
      <option value="Pixel">Pixel</option>
      <option value="Realme">Realme</option>
    </select>

    <input id="search" placeholder="Search your phone model..." oninput="searchPhones()"/>
  </div>

  <div id="results"></div>

  <div class="info-box">
    🚀 More phone models and same-fit groups are being added regularly.<br><br>
    📩 Contact: adilpkd690@gmail.com
  </div>

  <script>
    const phones = [
      { brand:"Redmi", model:"Redmi 12 5G", fit:"Also fits Poco M6 Pro" },
      { brand:"Redmi", model:"Redmi Note 7", fit:"Also fits Redmi Note 7 Pro" },
      { brand:"Redmi", model:"Redmi 8", fit:"Also fits Redmi 8A / 8A Dual" },
      { brand:"Redmi", model:"Redmi 9A", fit:"Also fits Redmi 9i" },
      { brand:"Redmi", model:"Redmi 9C", fit:"Also fits Redmi 10A / Poco C3 / Poco C31" },
      { brand:"Redmi", model:"Redmi 9", fit:"Also fits Redmi 9 Prime / Poco M2" },
      { brand:"Redmi", model:"Redmi Note 10 Pro", fit:"Also fits Note 10 Pro Max" },
      { brand:"Redmi", model:"Redmi Note 10 4G", fit:"Also fits Note 10S / Note 11SE / Poco M5S" },
      { brand:"Redmi", model:"Redmi 13C", fit:"Also fits Poco C65" },
      { brand:"Redmi", model:"Redmi Note 14 Pro", fit:"Also fits 14 Pro Plus" },

      { brand:"Vivo", model:"iQOO Z6", fit:"Also fits Vivo T1 5G / Y55 / Y75" },
      { brand:"Vivo", model:"iQOO Z3", fit:"Also fits Vivo Y72" },
      { brand:"Vivo", model:"Vivo Y16", fit:"Also fits Y56 / Y02s / Y35 / T2x" },
      { brand:"Vivo", model:"Vivo V40", fit:"Also fits V40 Pro / T3 Ultra" },

      { brand:"Samsung", model:"Samsung A02", fit:"Also fits M02 / A022" },
      { brand:"Samsung", model:"Samsung A05", fit:"Also fits M05 / F05" },
      { brand:"Samsung", model:"Samsung A12", fit:"Also fits M12 / F12" },
      { brand:"Samsung", model:"Samsung A14", fit:"4G / 5G shared shell" },
      { brand:"Samsung", model:"Samsung A20", fit:"Also fits A30 / M10s" },

      { brand:"Realme", model:"Realme C2", fit:"Also fits Oppo A3s / A1k" },
      { brand:"Realme", model:"Realme C55", fit:"Also fits Narzo N55" },

      { brand:"Pixel", model:"Pixel 9", fit:"Also fits Pixel 9 Pro" },
      { brand:"Pixel", model:"Pixel 10", fit:"Also fits Pixel 10 Pro" },

      { brand:"Moto", model:"Moto G85", fit:"Also fits G96 / 50 Fusion" },
      { brand:"Moto", model:"Moto G31", fit:"Also fits G41" }
    ];

    function searchPhones(){
      const q=document.getElementById("search").value.toLowerCase();
      const b=document.getElementById("brand").value;
      const results=document.getElementById("results");
      results.innerHTML="";

      phones
        .filter(p =>
          (b==="" || p.brand===b) &&
          (p.model.toLowerCase().includes(q) || p.fit.toLowerCase().includes(q))
        )
        .forEach(phone=>{
          results.innerHTML += `
            <div class="card">
              <h3>${phone.brand} • ${phone.model}</h3>
              <p>${phone.fit}</p>
            </div>
          `;
        });
    }

    searchPhones();
  </script>
</body>
</html>
