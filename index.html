<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Fit</title>
<style>
:root{--bg:#020b2a;--text:#fff;--card:rgba(255,255,255,.06)}
body.light{--bg:#ffffff;--text:#111827;--card:rgba(0,0,0,.05)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);transition:.25s}
.page{max-width:720px;margin:auto;padding:24px 20px 40px}.hidden{display:none}
h1{font-size:64px;text-align:center;margin:30px 0}.btn{display:block;width:100%;padding:28px 20px;margin:18px 0;border-radius:28px;text-decoration:none;font-size:32px;font-weight:700;text-align:center;color:#000;border:none}
.green{background:#22c55e}.blue{background:#22d3ee}.back{font-size:24px;padding:14px 18px;border-radius:16px;background:#22c55e;color:#000;text-decoration:none;display:inline-block;margin-bottom:20px}
.soon{margin:22px 0;padding:28px;border:3px solid #f59e0b;border-radius:28px;text-align:center;font-size:34px;color:#f59e0b;animation:blink 1.2s infinite}@keyframes blink{50%{opacity:.45}}
.contact-card{margin:80px 0 20px;padding:20px;border:1px solid rgba(255,255,255,.15);border-radius:24px;background:rgba(255,255,255,.03)} .mail{display:block;background:#38bdf8;color:#000;text-decoration:none;text-align:center;padding:18px;border-radius:20px;font-size:22px;font-weight:700}
input{width:100%;padding:18px;border-radius:18px;border:1px solid #334155;background:#0f172a;color:#fff;font-size:24px;margin:10px 0 20px}.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:22px;border-radius:22px;margin:14px 0;font-size:22px;line-height:1.4}.warn{color:#f87171;font-size:16px;font-weight:700;display:block;margin-top:8px}
</style>
</head>
<body>
<button onclick="toggleTheme()" style="position:fixed;top:16px;right:16px;z-index:999;padding:12px 16px;border:none;border-radius:14px;background:#fff;color:#000;font-weight:700">☀️ White</button>
<div id="home" class="page">
<h1>Case Fit</h1>
<button class="btn green" onclick="showPage('search')">🔍 Find Suitable Case</button>
<button class="btn blue" onclick="showPage('glass')">🛡️ Screen Glass</button>
<div class="soon">⚡ More Models Soon ⚡</div>
<div class="contact-card"><div style="font-size:22px;margin-bottom:14px">📞 Contact</div><a class="mail" href="mailto:adilpkd690@gmail.com">adilpkd690@gmail.com</a></div>
</div><div id="search" class="page hidden">
<a href="#" class="back" onclick="showPage('home')">← Back</a>
<input id="searchBox" placeholder="Search any model directly..." oninput="renderModels()">
<div id="modelList"></div>
</div><div id="glass" class="page hidden">
<a href="#" class="back" onclick="showPage('home')">← Back</a>
<div class="soon">🛡️ Screen Glass Coming Soon 🛡️</div>
</div><script>
const models = [
'• Redmi M3 / M2','• Redmi 7 - Redmi Y3','• Redmi 12 5G - Poco M6 Pro','• Redmi Note 7 - Redmi Note 7 Pro','• Redmi 8 - Redmi 8A - Redmi 8A Dual','• Redmi 9A - Redmi 9i','• Redmi 9C - Redmi 10A - Poco C3 - Poco C31','• Redmi 9 - Redmi 9 Prime','• Redmi Note 10 Pro - Redmi Note 10 Pro Max','• Redmi Note 10 4G - Note 10s - Note 11SE - Poco M5s','• Redmi 11 Prime 5G - Redmi Note 11e 5G','• Poco M4 5G - Poco M5 4G','• Redmi 11X / 11X Pro - Redmi K40 - Poco F3','• Redmi Note 11 Pro 4G/5G - Note 12 Pro 4G','• Redmi Note 11s - Note 11 4G','• Redmi Note 11 5G - Poco M4 Pro 5G - Note 11T 5G','• Redmi 13C 4G/5G - Poco C65','• Redmi 10C - Redmi 10 4G - Redmi 10 Power - Poco C40','• Redmi Note 14 Pro - 14 Pro Plus','• Redmi 6 - 6A','• Poco X6 Pro - Redmi K70e 5G','• Redmi Y1 - Note 5A','• Redmi K20 - K20 Pro - Redmi 9T',
'• iQOO Z6 - Vivo T1 5G - Vivo Y55 - Vivo Y75 5G','• iQOO Z3 - Vivo Y72 5G','• iQOO Neo 7 - Neo 7 Pro','• Vivo Y04 - Y19e - Y29s 5G - T4 Lite 5G - iQOO Z10 Lite','• Vivo Y16 - Y56 - Y02s - Y35 - T2x - iQOO Z7i','• Vivo V40 - V40 Pro - T3 Ultra - S19 Pro','• Vivo T2 Pro - iQOO Z7 Pro - Vivo S17e','• Vivo T4x - Y29 4G - Y31 Pro 5G - iQOO Z10x',
'• Moto G85 - G96 - 50 Fusion','• Moto G31 - G41','• Pixel 9 - Pixel 9 Pro','• Pixel 10 - Pixel 10 Pro',
'• Realme C2 - Oppo A3s - Oppo A1k','• Realme C55 - Narzo N55','• Oppo F27 - Reno 12F 4G/5G','• Oppo F23 - Oppo A1 5G - A98','• Oppo A57 4G/5G - A77 - A77s - Narzo 50 5G - Nord N300','• Realme C53 - C51 - Narzo N53 - Note 50','• Realme C30 / C30s - Narzo 50i Prime',
'• Samsung A02 - M02','• Samsung A02s - M02s','• Samsung M13 - A04e','• Samsung A05 - M05 - F05','• Samsung F06 5G - M06 5G','• Samsung F14 5G - M14','• Samsung A10 - M10','• Samsung A10s - M01s','• Samsung A11 - M11','• Samsung A12 - M12 - F12','• Samsung A13 - A32 5G - M32 5G','• Samsung M23 - F23','• Samsung A13 5G - A04s','• Samsung A14 4G/5G','• Samsung M16 5G - F16 5G','• Samsung A20 - A30 - M10s','• Samsung A22 4G - M32 4G','• Samsung A22 5G - A22s 5G - F42 5G','• Samsung A24 4G - A25 5G','• Samsung A32 4G - M32','• Samsung A52 4G - A52 5G - A52s 5G'
];
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');if(id==='search')renderModels();}
function renderModels(){const q=(document.getElementById('searchBox').value||'').toLowerCase();const box=document.getElementById('modelList');box.innerHTML='';models.filter(m=>m.toLowerCase().includes(q)).forEach(m=>{const warn=/M3 \/ M2|A24 4G - A25 5G|A12 - M12 - F12|A13 - A32 5G/.test(m)?'<span class="warn">CHECK BEFORE BUY / OPEN TYPE POSSIBILITY</span>':'';box.innerHTML+=`<div class="card">${m}${warn}</div>`});}
showPage('home');
function toggleTheme(){document.body.classList.toggle('light');}
</script></body></html>
