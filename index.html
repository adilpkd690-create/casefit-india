<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CASE FIT | Smart Finder</title>
<style>
:root {
  --primary: #00f2fe;
  --secondary: #4facfe;
  --accent: #ff9a9e;
  --bg-dark: #0f172a;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --text-dim: #94a3b8;
}

body {
  margin: 0;
  background: radial-gradient(circle at top right, #1e293b, #0f172a);
  color: #f8fafc;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
}

.wrap {
  max-width: 430px;
  margin: auto;
  padding: 40px 20px;
}

h1 {
  text-align: center;
  font-size: 42px;
  font-weight: 900;
  letter-spacing: -1.5px;
  margin: 20px 0 40px;
  background: linear-gradient(to right, #00f2fe, #4facfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: #fff;
  text-decoration: none;
  padding: 18px;
  border-radius: 20px;
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn:active { transform: scale(0.96); }

.casebtn { 
    background: linear-gradient(135deg, #05d5ff, #007bff); 
    box-shadow: 0 10px 25px rgba(0, 123, 255, 0.3);
    border: none;
}

.glassbtn { border-color: rgba(72, 199, 245, 0.4); color: #48c7f5; }

.search-container {
    position: sticky;
    top: 10px;
    z-index: 100;
}

.search {
  width: 100%;
  padding: 18px 24px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  background: rgba(30, 41, 59, 0.9);
  backdrop-filter: blur(20px);
  color: #fff;
  font-size: 16px;
  box-sizing: border-box;
  margin-bottom: 24px;
  outline: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.search:focus { border-color: var(--primary); }

.card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 22px;
  padding: 18px;
  margin-bottom: 14px;
  animation: slideUp 0.4s ease forwards;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

.title { font-size: 18px; color: #fff; font-weight: 700; margin-bottom: 6px; }
.fit { font-size: 14px; color: var(--text-dim); line-height: 1.5; }
mark { background: rgba(0, 242, 254, 0.3); color: #fff; border-radius: 4px; padding: 0 2px; }

.badges { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.badge {
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
}
.badge-open { background: rgba(243, 202, 84, 0.15); color: #f3ca54; border: 1px solid rgba(243, 202, 84, 0.2); }
.badge-check { background: rgba(255, 158, 168, 0.15); color: #ff9ea8; border: 1px solid rgba(255, 158, 168, 0.2); }

.page { display: none; }
.page.active { display: block; }

.back {
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  background: var(--glass);
  text-decoration: none;
  width: 45px;
  height: 45px;
  border-radius: 16px;
  font-size: 20px;
  margin-bottom: 20px;
}

.no-results { text-align: center; padding: 40px; color: var(--text-dim); }

.contact { margin-top: 50px; text-align: center; border-top: 1px solid var(--glass-border); padding-top: 20px; }
.contact-btn { color: var(--secondary); text-decoration: none; font-size: 14px; display: block; margin-top: 8px; }
</style>
</head>
<body>
<div class='wrap'>
  <div id='homePage' class='page active'>
    <h1>CASE FIT</h1>
    <a class='btn casebtn' href='#' onclick="showPage('searchPage');return false;">🔍 Find Suitable Case</a>
    <a class='btn glassbtn' href='#' onclick="showPage('glassPage');return false;">🛡️ Screen Glass</a>
    <div class='contact'>
      <div style="font-size: 12px; color: var(--text-dim);">Database v2.0 | Support:</div>
      <a class="contact-btn" href='mailto:adilpkd690@gmail.com'>adilpkd690@gmail.com</a>
    </div>
  </div>

  <div id='searchPage' class='page'>
    <a class='back' href='#' onclick="showPage('homePage');return false;">←</a>
    <div class="search-container">
        <input id='searchBox' class='search' placeholder='Search model (e.g. M14, Note 10)...' oninput='filterModels()'>
    </div>
    <div id='list'></div>
  </div>

  <div id='glassPage' class='page'>
    <a class='back' href='#' onclick="showPage('homePage');return false;">←</a>
    <div class='card' style="text-align: center; border-color: var(--secondary);">
      <div class='title' style='color: var(--secondary)'>🛡️ SCREEN GLASS</div>
      <p class='fit'>Database being updated. Check back soon!</p>
    </div>
  </div>
</div>

<script>

    {n:'iQOO Z6', f:'Fits: Vivo T1 5G / Vivo Y55 / Vivo Y75 5G'},

    {n:'Samsung F15', f:'Fits: M15 5G'},
    {n:'Samsung A70 / A70s', f:'Common fit'},
    {n:'Samsung A01 / M01', check:true},
    {n:'Samsung M54 / F54', f:'Common fit'},
    {n:'Samsung M56 / F56', f:'Common fit'},
    {n:'Samsung M34 5G / F34 5G', f:'Common fit'},
    {n:'Samsung M22 / F22', f:'Fits: M32'},
    {n:'Samsung A50 / A30s / A50s', f:'Common fit'},
    {n:'Samsung A42 / M42', f:'Common fit'}
];

function highlight(text, q) {
    if(!q) return text;
    return text.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
}

function render(items, q = '') {
    const list = document.getElementById('list');
    if (items.length === 0) {
        list.innerHTML = `<div class="no-results">No matches found for "${q}"</div>`;
        return;
    }
    list.innerHTML = items.map((m, i) => `
    <div class='card' style="animation-delay: ${i*0.03}s">
        <div class='title'>${highlight(m.n, q)}</div>
        ${m.f ? `<div class='fit'>${highlight(m.f, q)}</div>` : ''}
        ${m.open || m.check ? `<div class='badges'>
            ${m.open ? `<span class='badge badge-open'>OPEN TYPE</span>` : ''}
            ${m.check ? `<span class='badge badge-check'>CHECK BEFORE BUY</span>` : ''}
        </div>` : ''}
    </div>`).join('');
}

function filterModels() {
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    const filtered = models.filter(m => 
        m.n.toLowerCase().includes(q) || (m.f && m.f.toLowerCase().includes(q))
    );
    render(filtered, q);
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'searchPage') {
        const sb = document.getElementById('searchBox');
        sb.value = '';
        render(models);
        setTimeout(() => sb.focus(), 150);
    }
}
render(models);
</script>
</body>
</html>
