<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Case Fit</title>
<style>
body{
  margin:0;
  background:#020b3a;
  color:#fff;
  font-family:Arial,sans-serif;
}
h1{
  font-size:68px;
  text-align:center;
  margin:30px 0;
  font-family:Georgia,'Times New Roman',serif;
  letter-spacing:4px;
  text-transform:uppercase;
  font-weight:900;
}
#list{
  padding:8px 12px 40px;
}
.card{
  background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
  margin:18px 10px;
  border-radius:28px;
  padding:28px;
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}
.card h3{
  margin:0;
  color:#35e06f;
  font-size:28px;
}
.card p{
  font-size:20px;
  color:#eee;
  margin:16px 0 8px;
}
.badges{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin:14px 0;
}
.badge{
  padding:10px 18px;
  border-radius:999px;
  font-size:14px;
  font-weight:700;
}
.open{
  color:#f6c54a;
  border:1px solid rgba(246,197,74,.4);
  background:rgba(246,197,74,.12);
}
.check{
  color:#ff8d8d;
  border:1px solid rgba(255,141,141,.4);
  background:rgba(255,141,141,.12);
}
small{
  display:block;
  color:#ffb1b1;
  font-size:14px;
  line-height:1.4;
}
</style>
</head>
<body>

<h1>CASE FIT</h1>
<div id="list"></div>

<script>
const models = [
  "Redmi M3 / M2 (check)",
  "Redmi 7 - Redmi Y3",
  "Redmi 12 5G - Poco M6 Pro",
  "Redmi Note 7 - Redmi Note 7 Pro",
  "Redmi 8 - Redmi 8A - Redmi 8A Dual",
  "Redmi 9A - Redmi 9i",
  "Redmi 9C - Redmi 10A - Poco C3 - Poco C31",
  "Redmi 9 - Redmi 9 Prime",
  "Redmi Note 10 Pro - Redmi Note 10 Pro Max",
  "Redmi 13C 4G - Redmi 13C 5G (open type) - Poco C65",
  "Poco X6 Pro - Redmi K70e 5G",
  "Samsung A12 4G/5G (open type) - M12 - F12",
  "Samsung A13 4G/5G (open type) - A32 5G - M32 5G",
  "Samsung A24 4G - A25 5G (check)",
  "Samsung A52 4G - A52 5G - A52s 5G"
];

function renderModel(mainName, subName, isOpen, isCheck) {
  return `
    <div class="card">
      <h3>${mainName}</h3>
      ${subName ? `<p>Also fits ${subName}</p>` : ""}
      ${(isOpen || isCheck) ? `
        <div class="badges">
          ${isOpen ? `<span class="badge open">OPEN TYPE</span>` : ""}
          ${isCheck ? `<span class="badge check">CHECK BEFORE BUY</span>` : ""}
        </div>
        <small>Verify camera cutout, fingerprint slot, and speaker holes before final use.</small>
      ` : ""}
    </div>
  `;
}

const list = document.getElementById("list");

models.forEach(item => {
  let txt = item;
  const lower = txt.toLowerCase();

  const isOpen = lower.includes("(open type)");
  const isCheck = lower.includes("(check)");

  txt = txt
    .replace(/\(open type\)/ig, "")
    .replace(/\(check\)/ig, "")
    .trim();

  const parts = txt.split(" - ");
  const main = parts.shift();
  const sub = parts.join(" / ");

  list.innerHTML += renderModel(main, sub, isOpen, isCheck);
});
</script>

</body>
</html>
