<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Search Suitable Case</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#0f172a,#1e293b);color:#fff;min-height:100vh}
.top-nav{position:sticky;top:0;z-index:100;background:#0f172a;padding:14px;border-bottom:1px solid #334155}
.top-nav button{background:#22c55e;color:#08120c;border:none;padding:12px 18px;border-radius:12px;font-size:16px;font-weight:700}
.wrap{max-width:900px;margin:auto;padding:18px}
.search{width:100%;padding:16px;border-radius:14px;border:1px solid #475569;font-size:18px;margin:16px 0;background:#111827;color:#fff}
.card{background:#1e293b;border:1px solid #334155;border-radius:18px;padding:18px;margin-bottom:14px}
.mark{color:#facc15;font-weight:700}
.warn{color:#f59e0b;font-weight:700}
.empty{text-align:center;padding:30px;color:#94a3b8}
</style>
</head>
<body>
<div class="top-nav">
  <button onclick="goBack()">⬅ Back</button>
</div>
<div class="wrap">
  <input id="searchBox" class="search" placeholder="Search any model directly..." oninput="renderResults(this.value)" />
  <div id="results"></div>
</div><script>
const raw = localStorage.getItem('caseCompatibilityData') || `• Redmi M3 / M2 ⚠ CHECK BEFORE BUY
• Redmi 7 - Redmi Y3
• Redmi 12 5G - Poco M6 Pro
• Redmi Note 7 - Redmi Note 7 Pro
• Redmi 8 - Redmi 8A - Redmi 8A Dual
• Redmi 9A - Redmi 9i
• Redmi 9C - Redmi 10A - Poco C3 - Poco C31
• Redmi 9 - Redmi 9 Prime
• Redmi Note 10 Pro - Redmi Note 10 Pro Max
• Redmi Note 10 4G - Note 10S 4G - Note 11SE - Poco M5S 4G
• Redmi 11 Prime 5G - Redmi Note 11E 5G - Redmi 10 Prime Plus 5G
• POCO M4 5G - POCO M5 4G
• Redmi 11X / 11X Pro - Redmi K40 / K40 Pro / K40 Pro Plus - Redmi 11i - Poco F3
• Redmi Note 11 Pro 4G/5G - Note 11 Pro Plus 5G - Note 12 Pro 4G
• Redmi Note 11S - Note 11 4G
• Redmi Note 11 5G - Poco M4 Pro 5G - Note 11T 5G
• Redmi 13C 4G - Redmi 13C 5G (OPEN TYPE) - Poco C65
• Redmi 10C - Redmi 10 4G - Redmi 10 Power - Poco C40
• Redmi Note 14 Pro - 14 Pro Plus
• Redmi 6 - 6A
• Poco X6 Pro - Redmi K70E 5G
• Redmi Y1 - Note 5A
• Redmi K20 - K20 Pro - Redmi 9T - 9T Pro
• iQOO Z6 - Vivo T1 5G - Vivo Y55 - Vivo Y75 5G
• iQOO Z3 - Vivo Y72 5G
• iQOO Neo 7 - Neo 7 Pro
• Vivo Y04 - Y19e - Y29s 5G - T4 Lite 5G - Y19 5G - iQOO Z10 Lite 5G
• Vivo Y16 - Vivo Y56 5G - Vivo Y02s 4G - Vivo Y35 5G - Vivo T2x - iQOO Z7i
• Vivo V40 5G - V40 Pro 5G - Vivo T3 Ultra - Vivo S19 Pro 5G
• Vivo T1 4G - Vivo Y55 4G - iQOO Z6 44W
• Vivo T2 Pro 5G - iQOO Z7 Pro 5G - Vivo S17e
• Vivo T4x - Y29 4G - Y31 Pro 5G - iQOO Z10x
• Moto G85 - G96 - 50 Fusion
• Moto G31 - G41
• Pixel 9 - Pixel 9 Pro (OPEN TYPE)
• Pixel 10 - Pixel 10 Pro (OPEN TYPE)
• Realme C2 - Oppo A3s - Oppo A1k
• Realme C55 4G - Realme Narzo N55 4G
• Oppo F27 - Oppo Reno 12F 4G/5G - Reno 12 FS 5G
• Oppo F23 - Oppo A1 5G - A98
• Oppo A57 4G / 5G - A77 4G/5G - A77s 4G - A57e 4G - A57s 4G - Realme Narzo 50 5G - Realme V23 - OnePlus N20 SE - OnePlus Nord N300
• Realme C53 4G / C53e - C51 4G - Realme Narzo N53 - Realme Note 50 4G
• Realme C30 / C30s - Narzo 50i Prime
• Sam A02 - M02 - A022
• Sam A02s - M02s - A02s
• Sam M13 - A04e
• Sam A05 4G - M05 4G - F05 4G
• Sam F06 5G - M06 5G
• Sam F14 5G - M14
• Sam A10 - M10
• Sam A10s - M01s
• Sam A11 - M11
• Sam A12 4G / 5G (OPEN TYPE) - M12 - F12
• Sam A13 4G / 5G (OPEN TYPE) - A32 5G - M32 5G (OPEN TYPE)
• Sam M23 - F23
• Sam A13 5G - A04s
• Sam A14 4G/5G
• Sam M16 5G - F16 5G
• Sam A20 - A30 - M10s
• Sam A22 4G - M32 4G
• Sam A22 5G - A22s 5G - F42 5G
• Sam A24 4G - A25 5G ⚠ CHECK BEFORE BUY
• Sam A32 4G - M32
• Sam A52 4G - A52 5G - A52s 5G`;
const models = raw.split('\n').filter(Boolean);

function goBack(){
  window.location.href = '/';
}

function highlight(text, query){
  if(!query) return text;
  const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(safe, 'ig'), m => `<span class="mark">${m}</span>`);
}

function renderResults(query=''){
  const q = query.trim().toLowerCase();
  const list = q ? models.filter(m => m.toLowerCase().includes(q)) : models;
  const box = document.getElementById('results');

  if(!list.length){
    box.innerHTML = '<div class="empty">No matching models found</div>';
    return;
  }

  box.innerHTML = list.map(item => {
    let line = highlight(item, query);
    line = line.replace(/⚠ CHECK BEFORE BUY/gi,'<span class="warn">⚠ CHECK BEFORE BUY</span>');
    line = line.replace(/OPEN TYPE/gi,'<span class="mark">OPEN TYPE</span>');
    return `<div class="card">${line}</div>`;
  }).join('');
}

renderResults();
</script></body>
</html>
