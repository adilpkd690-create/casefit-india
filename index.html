<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <title id="meta-title">CaseFit India | Pro Mobile Accessories Finder</title>
    
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><text x='50%' y='60%' font-size='45' font-family='sans-serif' font-weight='bold' text-anchor='middle' fill='%2300f2fe'>CF</text></svg>">
    <link rel="manifest" id="manifest-link" />

<style>
:root { --primary: #00f2fe; --secondary: #4facfe; --bg-dark: #0f172a; --glass: rgba(255, 255, 255, 0.05); --glass-active: rgba(0, 242, 254, 0.15); --glass-border: rgba(255, 255, 255, 0.1); --warning: #ff7675; --model-green: #2ecc71; --text-dim: #94a3b8; --share-btn: rgba(37, 211, 102, 0.15); }
body { margin: 0; background: radial-gradient(circle at top, #1e293b, #0f172a); background-attachment: fixed; color: #f8fafc; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; overflow-y: scroll; }
.wrap { max-width: 430px; margin: 0 auto; padding: 30px 20px 40px; }
.logo-container { text-align: center; margin: 20px 0 35px; }
.btn { display: flex; align-items: center; justify-content: center; gap: 12px; color: #fff; text-decoration: none; padding: 20px; border-radius: 22px; font-size: 18px; font-weight: 700; margin-bottom: 15px; background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(15px); transition: 0.3s; cursor: pointer; }
.btn:active { transform: scale(0.97); }
.casebtn { background: linear-gradient(135deg, #05d5ff, #007bff); border: none; box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3); }
.glassbtn { border-color: rgba(72, 199, 245, 0.5); color: #48c7f5; }
.sticky-header { position: sticky; top: 10px; z-index: 100; margin-bottom: 15px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); padding-bottom: 10px; border-radius: 20px; }
.search-wrapper { position: relative; width: 100%; }
.search { width: 100%; padding: 18px 50px 18px 24px; border-radius: 20px; border: 1px solid var(--glass-border); background: rgba(15, 23, 42, 0.95); color: #fff; font-size: 16px; box-sizing: border-box; outline: none; box-shadow: 0 10px 25px rgba(0,0,0,0.4); transition: 0.3s; }
.search:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); }
.mic-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; color: var(--primary); cursor: pointer; transition: 0.2s; }
.result-count { font-size: 13px; color: var(--secondary); margin: 12px 0 0 8px; font-weight: 700; min-height: 15px; }
.quick-shortcuts { margin-bottom: 20px; }
.section-title { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 10px; scrollbar-width: none; }
.filter-scroll::-webkit-scrollbar { display: none; }
.chip { padding: 8px 14px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--text-dim); white-space: nowrap; cursor: pointer; transition: 0.2s; }
.chip.active { background: var(--glass-active); color: var(--primary); border-color: var(--primary); }

/* V2 PRO GLASS BOX CSS */
.card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px; margin-bottom: 14px; position: relative; transition: opacity 0.3s ease; }
.compact-title { font-size: 16px; color: var(--secondary); font-weight: 800; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; letter-spacing: -0.3px; }
.glass-type-badge { font-size: 10px; color: #f39c12; background: rgba(243, 156, 18, 0.15); padding: 4px 8px; border-radius: 6px; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 10px; display: inline-block; }
.exact-fit-badge { font-size: 9px; color: #ff7675; background: rgba(255, 118, 117, 0.15); padding: 4px 6px; border-radius: 4px; font-weight: 800; border: 1px solid rgba(255, 118, 117, 0.3); }

.glass-box-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.glass-box { background: rgba(255, 255, 255, 0.06); color: #e2e8f0; padding: 6px 10px; border-radius: 6px; font-size: 11.5px; font-weight: 600; border: 1px solid rgba(255, 255, 255, 0.12); text-transform: uppercase; transition: 0.2s; user-select: none; }
.glass-box:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.2); }
.glass-box.highlight { background: #007bff; color: #fff; border-color: #007bff; box-shadow: 0 2px 8px rgba(0,123,255,0.4); }

.share-action { margin-top: 15px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #2ecc71; background: var(--share-btn); padding: 8px 14px; border-radius: 12px; font-weight: 700; cursor: pointer; border: 1px solid rgba(46, 204, 113, 0.2); transition: 0.2s; }
.share-action:active { transform: scale(0.95); }

.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.back { display: flex; align-items: center; justify-content: center; color: #fff; background: var(--glass); text-decoration: none; width: 48px; height: 48px; border-radius: 18px; margin-bottom: 15px; border: 1px solid var(--glass-border); cursor: pointer; }
.no-result { text-align: center; padding: 40px 15px; background: rgba(255, 118, 117, 0.05); border-radius: 24px; border: 1px dashed rgba(255, 118, 117, 0.3); }
.req-btn { background: #ea4335; color: white; text-decoration: none; padding: 14px 24px; border-radius: 14px; font-size: 15px; font-weight: 800; display: inline-block; border: none; margin-top: 15px; box-shadow: 0 4px 15px rgba(234, 67, 53, 0.3); transition: 0.2s; }
.req-btn:active { transform: scale(0.95); }
mark { background-color: rgba(0, 242, 254, 0.3); color: #fff; border-radius: 3px; padding: 0 2px; }
</style>
</head>
<body>

<div class='wrap'>
  <div id='homePage' class='page active'>
    <div class="logo-container">
      <svg width="250" height="60" viewBox="0 0 250 60">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00f2fe"/><stop offset="100%" stop-color="#4facfe"/></linearGradient></defs>
        <g transform="translate(10, 8)"><rect width="26" height="42" rx="7" fill="none" stroke="url(#g)" stroke-width="3"/><path d="M 8 20 L 14 26 L 30 10" fill="none" stroke="#2ecc71" stroke-width="3.5" stroke-linecap="round"/></g>
        <text x="45" y="42" font-family="sans-serif" font-weight="900" font-size="30" fill="url(#g)" letter-spacing="-1">CaseFit</text>
      </svg>
    </div>
    <a href="#" class='btn casebtn' onclick="showPage('searchPage'); return false;">🔍 Find Suitable Case</a>
    <a href="#" class='btn glassbtn' onclick="showPage('glassPage'); return false;">🛡️ Screen Glass</a>
    <div style="text-align:center; margin-top:40px; font-size:10px; color:#475569;">© 2026 CaseFit India Pro</div>
  </div>

  <div id='searchPage' class='page'>
    <a href="#" class='back' onclick="showPage('homePage'); return false;">←</a>
    <div class="sticky-header">
        <div class="search-wrapper">
            <input id='searchBox' class='search' placeholder='Search cover model...' oninput='handleSearchInput()'>
            <button class="mic-btn" onclick="startVoiceSearch('searchBox')">🎤</button>
        </div>
        <div id="resultCount" class="result-count">Showing...</div>
    </div>
    <div id='list'></div>
  </div>

  <div id='glassPage' class='page'>
    <a href="#" class='back' onclick="showPage('homePage'); return false;">←</a>
    <div class="sticky-header">
        <div class="search-wrapper">
            <input id='glassSearchBox' class='search' placeholder='Search glass model...' oninput='handleGlassSearch()'>
            <button class="mic-btn" onclick="startVoiceSearch('glassSearchBox')">🎤</button>
        </div>
        <div id="glassResultCount" class="result-count">Showing...</div>
    </div>

    <div id="glassShortcuts" class="quick-shortcuts">
        <div class="section-title" id="recentTitle" style="display:none;">🕒 Recent Searches</div>
        <div class="filter-scroll" id="recentList"></div>
        
        <div class="section-title" style="margin-top:15px;">🔥 Popular Glass Models</div>
        <div class="filter-scroll">
            <div class="chip" onclick="quickSearchGlass('Vivo Y20')">Vivo Y20</div>
            <div class="chip" onclick="quickSearchGlass('Realme 5')">Realme 5</div>
            <div class="chip" onclick="quickSearchGlass('Samsung A14')">Samsung A14</div>
            <div class="chip" onclick="quickSearchGlass('Redmi 13C')">Redmi 13C</div>
        </div>
    </div>

    <div id='glassList'></div>
    <div style="text-align: center; margin-top: 25px; margin-bottom: 20px;">
        <div style="font-size: 10px; font-weight: 800; color: #475569; letter-spacing: 2px; text-transform: uppercase;">
            🔄 Database Sync Active
        </div>
    </div>
  </div>
</div>
<script>
let databaseModels = []; let glassModels = [];
let searchTimeout; let glassSearchTimeout;
let recentSearches = JSON.parse(localStorage.getItem('cf_recent_glass') || '[]');

Promise.all([
    fetch('models.json').then(r => r.json()).catch(() => []),
    fetch('glass.json').then(r => r.json()).catch(() => [])
]).then(([cases, glass]) => {
    databaseModels = cases; glassModels = glass;
    const getCount = (db) => db.reduce((acc, m) => acc + (m.f ? m.f.split(/[,/]/).filter(x=>x.trim()).length : 1), 0);
    
    document.getElementById('resultCount').innerText = `Total ${getCount(cases)}+ covers ready`; 
    document.getElementById('glassResultCount').innerText = `Total ${getCount(glass)}+ glasses ready`;
    updateRecentUI();
});

// Typo Tolerance Logic (Ignores spaces & special chars for matching)
const sanitize = str => str.toLowerCase().replace(/[^a-z0-9]/g, '');

function handleSearchInput() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => filterModels(), 200); 
}

function handleGlassSearch() {
    clearTimeout(glassSearchTimeout);
    glassSearchTimeout = setTimeout(() => {
        const q = document.getElementById('glassSearchBox').value.trim();
        const sq = sanitize(q);
        
        // Save to Recent if valid
        if(q.length > 2 && !recentSearches.includes(q)) {
            recentSearches.unshift(q);
            if(recentSearches.length > 4) recentSearches.pop();
            localStorage.setItem('cf_recent_glass', JSON.stringify(recentSearches));
            updateRecentUI();
        }

        document.getElementById('glassShortcuts').style.display = q === '' ? 'block' : 'none';
        
        let filtered = glassModels.filter(m => 
            sanitize(m.n).includes(sq) || (m.f && sanitize(m.f).includes(sq))
        );
        renderGlass(filtered, q);
    }, 250);
}

function updateRecentUI() {
    const list = document.getElementById('recentList');
    const title = document.getElementById('recentTitle');
    if(recentSearches.length > 0) {
        title.style.display = 'block';
        list.innerHTML = recentSearches.map(r => `<div class="chip" style="border-color:var(--secondary); color:var(--secondary);" onclick="quickSearchGlass('${r}')">${r}</div>`).join('');
    }
}

function highlight(text, q) {
    if (!q) return text;
    return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<mark>$1</mark>');
}

function quickSearchGlass(query) {
    document.getElementById('glassSearchBox').value = query;
    handleGlassSearch();
}

function startVoiceSearch(inputId) {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Speech) {
        const rec = new Speech();
        rec.onresult = (e) => { 
            document.getElementById(inputId).value = e.results[0][0].transcript; 
            if(inputId === 'glassSearchBox') handleGlassSearch(); else filterModels();
        };
        rec.start();
    }
}

function shareResult(modelName, type) {
    const text = `📱 *${type} Fits:* ${modelName}\n✅ Verified on CaseFit India Pro`;
    if (navigator.share) { navigator.share({ title: 'CaseFit India', text: text }); } 
    else { navigator.clipboard.writeText(text); alert("Copied to clipboard!"); }
}

function filterModels() {
    const q = document.getElementById('searchBox').value.trim();
    const sq = sanitize(q);
    let filtered = databaseModels.filter(m => sanitize(m.n).includes(sq) || (m.f && sanitize(m.f).includes(sq)));
    
    let realCount = filtered.reduce((acc, m) => acc + (m.f ? m.f.split(/[,/]/).filter(x=>x.trim()).length : 1), 0);
    document.getElementById('resultCount').innerHTML = `Found ${realCount} compatible cover model(s)`;

    const list = document.getElementById('list');
    if (filtered.length === 0 && q) {
        list.innerHTML = `<div class="no-result"><h3>📦 No Results</h3><a href="mailto:adilpkd690@gmail.com?subject=Request: ${q}" class="req-btn">📧 Request Model</a></div>`;
        return;
    }
    
    list.innerHTML = filtered.map(m => `
    <div class='card'>
        <div class='title' style="font-size:18px;">${highlight(m.n, q)}</div>
        <div class='fit'>${m.f ? 'Also fits: ' + highlight(m.f, q) : 'Exact fit only'}</div>
    </div>`).join('');
}

// V2 PRO: Advanced Glass Render Logic (Sort, Exact Match, Blue Highlight)
function renderGlass(items, q = '') {
    const list = document.getElementById('glassList');
    if (q === '') { list.innerHTML = ''; document.getElementById('glassResultCount').innerHTML = ''; return; }

    let realCount = 0;
    const sq = sanitize(q);

    let html = items.map(m => {
        let exactBoxes = []; let otherBoxes = [];
        
        if(m.f) {
            let splitItems = m.f.split(',').map(s => s.trim()).filter(s => s);
            realCount += splitItems.length;

            splitItems.forEach(chip => {
                if(sanitize(chip).includes(sq)) exactBoxes.push(`<span class="glass-box highlight">${highlight(chip, q)}</span>`);
                else otherBoxes.push(`<span class="glass-box">${chip}</span>`);
            });
        } else { realCount += 1; }

        let finalBoxes = [...exactBoxes, ...otherBoxes]; // EXACT MATCH FIRST (Blue Boxes)
        let boxHtml = finalBoxes.length > 0 ? `<div class="glass-box-container">${finalBoxes.join('')}</div>` : '';
        
        let isExactFit = finalBoxes.length === 0;
        let exactBadge = isExactFit ? `<span class="exact-fit-badge">EXACT FIT</span>` : '';
        let typeBadge = `<div class="glass-type-badge">${m.t ? m.t : 'HD GLASS'}</div>`;

        return `
        <div class='card'>
            <div class='compact-title'>
                <span>${highlight(m.n, q)}</span>
                ${exactBadge}
            </div>
            ${typeBadge}
            ${boxHtml}
            <div class="share-action" onclick="shareResult('${m.n}', 'Screen Glass')">📲 Share via WhatsApp</div>
        </div>`;
    }).join('');

    document.getElementById('glassResultCount').innerHTML = `Found ${realCount} exact matched device(s)`;
    list.innerHTML = items.length === 0 ? `<div class="no-result"><h3>🛡️ No Glass Found</h3><a href="mailto:adilpkd690@gmail.com?subject=Glass Request: ${q}" class="req-btn">📧 Request ${q}</a></div>` : html;
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active'); window.scrollTo(0, 0);
    
    if(id === 'searchPage') { document.getElementById('searchBox').value = ''; filterModels(); }
    if(id === 'glassPage') { document.getElementById('glassSearchBox').value = ''; handleGlassSearch(); document.getElementById('glassShortcuts').style.display='block'; }
}
</script>
</body>
</html>
