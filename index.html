<!DOCTYPE html><html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CaseFit India</title>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#020617,#0f172a,#1e293b,#312e81);
      color:white;
      padding:20px;
      min-height:100vh;
    }
    .hero{
      position:relative;
      overflow:hidden;
      text-align:center;
      padding:40px 20px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      backdrop-filter:blur(12px);
      box-shadow:0 25px 60px rgba(0,0,0,0.45);
      margin-bottom:20px;
    }
    .hero h1{font-size:42px;margin:0;}
    .hero p{color:#cbd5e1;margin-top:10px;}
    .search-wrap{
      display:grid;
      gap:12px;
      margin:20px 0;
    }
    select,input{
      width:100%;padding:14px;border:none;border-radius:14px;
      background:rgba(255,255,255,0.08);color:white;font-size:16px;
      outline:none;
    }
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:bold;margin-top:10px;}
    .badge-open{background:rgba(245,158,11,0.18);border:1px solid rgba(245,158,11,0.35);color:#fcd34d;}
    .model-redmi{border-left:4px solid #f97316;}
    .model-vivo{border-left:4px solid #3b82f6;}
    .model-samsung{border-left:4px solid #22c55e;}
    .model-realmе{border-left:4px solid #a855f7;}
    .model-moto{border-left:4px solid #eab308;}
    .model-pixel{border-left:4px solid #ec4899;}
    .card{
      backdrop-filter:blur(10px);
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.08);
      padding:18px;border-radius:18px;margin-top:15px;
      box-shadow:0 14px 34px rgba(0,0,0,0.28);
      transition:transform .2s ease;
    }
    .card:hover{transform:translateY(-2px);}
    .info-box{
      box-shadow:0 10px 25px rgba(0,0,0,0.18);
      margin-top:24px;padding:16px;border-radius:16px;
      background:rgba(255,255,255,0.06);color:#cbd5e1;
      border:1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>📱 CaseFit</h1>
    <p>Select your phone brand to explore same-fit compatible models</p>
  </div>  <div id="brandList" class="search-wrap"></div>
  <div id="modelSection" style="display:none;">
    <input id="search" placeholder="Search selected brand model..." oninput="searchPhones()"/>
    <div id="results"></div>
  </div>  <div class="info-box">
    🚀 More phone models and same-fit groups are added regularly.<br><br>
    📩 Contact: adilpkd690@gmail.com
  </div>  <script>
    const phones = [
      { brand:"Redmi", model:"Redmi 7", fit:"Also fits Redmi Y3" },
      { brand:"Redmi", model:"Redmi 12 5G", fit:"Also fits Poco M6 Pro" },
      { brand:"Redmi", model:"Redmi 13C", fit:"Also fits Poco C65 / 5G open type" },
      { brand:"Vivo", model:"iQOO Z6", fit:"Also fits Vivo T1 5G / Y55 / Y75" },
      { brand:"Vivo", model:"Vivo V40", fit:"Also fits V40 Pro / T3 Ultra" },
      { brand:"Samsung", model:"Samsung A12", fit:"Also fits M12 / F12 / 5G open type" },
      { brand:"Samsung", model:"Samsung A14", fit:"4G / 5G shared shell" },
      { brand:"Realme", model:"Realme C55", fit:"Also fits Narzo N55" },
      { brand:"Pixel", model:"Pixel 9", fit:"Also fits Pixel 9 Pro open type" },
      { brand:"Moto", model:"Moto G85", fit:"Also fits G96 / 50 Fusion" }
    ];

    let selectedBrand = "";
    const brands = [...new Set(phones.map(p => p.brand))];

    function renderBrands(){
      const box = document.getElementById('brandList');
      box.innerHTML = brands.map(b => `
        <div class="card model-${b.toLowerCase()}" onclick="selectBrand('${b}')" style="cursor:pointer;text-align:center;font-weight:bold;">
          ${b}
        </div>
      `).join('');
    }

    function selectBrand(brand){
      selectedBrand = brand;
      document.getElementById('modelSection').style.display = 'block';
      document.getElementById('search').value = '';
      searchPhones();
      window.scrollTo({top: document.getElementById('modelSection').offsetTop - 20, behavior:'smooth'});
    }

    function searchPhones(){
      const q = document.getElementById('search').value.toLowerCase();
      const results = document.getElementById('results');
      results.innerHTML = '';

      phones
        .filter(p => p.brand === selectedBrand && (p.model.toLowerCase().includes(q) || p.fit.toLowerCase().includes(q)))
        .forEach(phone => {
          const isOpen = phone.fit.toLowerCase().includes('open type');
          const badge = isOpen ? '<div class="badge">OPEN TYPE</div>' : '';
          const cls = 'model-' + phone.brand.toLowerCase();
          results.innerHTML += `
            <div class="card ${cls}">
              <h3>${phone.model}</h3>
              <p>${phone.fit}</p>
              ${badge}
            </div>
          `;
        });
    }

    renderBrands();
  </script></body>
</html>
