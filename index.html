<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CASE FIT | Smart Finder</title>
<style>
:root {
  --primary: #00f2fe;
  --secondary: #4facfe;
  --accent: #ff9a9e;
  --bg-dark: #0f172a;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --text-dim: #94a3b8;
  --warning: #ff7675; /* Reddish color for warning */
}

body {
  margin: 0;
  background: radial-gradient(circle at top right, #1e293b, #0f172a);
  color: #f8fafc;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
}

.wrap {
  max-width: 430px;
  margin: auto;
  padding: 40px 20px;
}

h1 {
  text-align: center;
  font-size: 42px;
  font-weight: 900;
  letter-spacing: -1.5px;
  margin: 20px 0 40px;
  background: linear-gradient(to right, #00f2fe, #4facfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: #fff;
  text-decoration: none;
  padding: 18px;
  border-radius: 20px;
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.casebtn { 
    background: linear-gradient(135deg, #05d5ff, #007bff); 
    box-shadow: 0 10px 25px rgba(0, 123, 255, 0.3);
    border: none;
}

.glassbtn { border-color: rgba(72, 199, 245, 0.4); color: #48c7f5; }

.search-container {
    position: sticky;
    top: 10px;
    z-index: 100;
}

.search {
  width: 100%;
  padding: 18px 24px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  background: rgba(30, 41, 59, 0.9);
  backdrop-filter: blur(20px);
  color: #fff;
  font-size: 16px;
  box-sizing: border-box;
  margin-bottom: 24px;
  outline: none;
}

.card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 22px;
  padding: 20px;
  margin-bottom: 14px;
  animation: slideUp 0.3s ease-out forwards;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Green color for model name like in your screenshot */
.title { font-size: 19px; color: #2ecc71; font-weight: 700; margin-bottom: 8px; }

.fit { font-size: 15px; color: #fff; line-height: 1.5; font-weight: 400; }

.badges { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

.badge {
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
}
.badge-open { background: rgba(243, 202, 84, 0.15); color: #f3ca54; border: 1px solid rgba(243, 202, 84, 0.3); }
.badge-check { background: rgba(255, 118, 117, 0.15); color: #ff7675; border: 1px solid rgba(255, 118, 117, 0.3); }

/* Warning Text Styling */
.warning-text {
  font-size: 12px;
  color: var(--warning);
  line-height: 1.4;
  margin-top: 8px;
  font-weight: 500;
  opacity: 0.9;
}

.page { display: none; }
.page.active { display: block; }

.back {
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  background: var(--glass);
  text-decoration: none;
  width: 45px; height: 45px;
  border-radius: 16px;
  margin-bottom: 20px;
}
</style>
</head>
<body>
<div class='wrap'>
  <div id='homePage' class='page active'>
    <h1>CASE FIT</h1>
    <a class='btn casebtn' href='#' onclick="showPage('searchPage');return false;">🔍 Find Suitable Case</a>
    <a class='btn glassbtn' href='#' onclick="showPage('glassPage');return false;">🛡️ Screen Glass</a>
  </div>

  <div id='searchPage' class='page'>
    <a class='back' href='#' onclick="showPage('homePage');return false;">←</a>
    <div class="search-container">
        <input id='searchBox' class='search' placeholder='Search model...' oninput='filterModels()'>
    </div>
    <div id='list'></div>
  </div>

  <div id='glassPage' class='page'>
    <a class='back' href='#' onclick="showPage('homePage');return false;">←</a>
    <div class='card' style="text-align: center;">
      <div class='title' style="color: var(--secondary)">🛡️ SCREEN GLASS</div>
      <p class='fit'>Adding database...</p>
    </div>
  </div>
</div>

    {n:'Samsung A42 / M42', f:'Common fit'}

function render(items, q = '') {
    const list = document.getElementById('list');
    list.innerHTML = items.map(m => `
    <div class='card'>
        <div class='title'>${m.n}</div>
        ${m.f ? `<div class='fit'>${m.f}</div>` : ''}
        ${m.open || m.check ? `<div class='badges'>
            ${m.open ? `<span class='badge badge-open'>OPEN TYPE</span>` : ''}
            ${m.check ? `<span class='badge badge-check'>CHECK BEFORE BUY</span>` : ''}
        </div>` : ''}
        ${m.open ? `<div class='warning-text'>Verify camera cutout, fingerprint slot, and speaker holes before final use.</div>` : ''}
    </div>`).join('');
}

function filterModels() {
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    const filtered = models.filter(m => 
        m.n.toLowerCase().includes(q) || (m.f && m.f.toLowerCase().includes(q))
    );
    render(filtered, q);
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'searchPage') {
        render(models);
        setTimeout(() => document.getElementById('searchBox').focus(), 150);
    }
}
render(models);
</script>
</body>
</html>
