<!DOCTYPE html><html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Case Fit</title>
<style>
body{margin:0;background:#020b3a;color:#fff;font-family:Arial,sans-serif}
h1{font-size:68px;text-align:center;margin:30px 0;font-family:Georgia,'Times New Roman',serif;letter-spacing:4px;text-transform:uppercase;font-weight:900}
.page{display:none;padding:20px}
.page.active{display:block}
.btn{display:block;width:100%;padding:24px;border-radius:28px;text-decoration:none;font-size:28px;font-weight:700;text-align:center;margin:18px 0;color:#000}
.green{background:#28d463}.blue{background:#42cfff}
.card{background:rgba(255,255,255,.06);margin:20px 0;border-radius:28px;padding:28px;border:1px solid rgba(255,255,255,.1)}
.card h3{margin:0;color:#35e06f;font-size:28px}
.card p{font-size:20px;color:#eee}
.badges{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0}
.badge{padding:10px 18px;border-radius:999px;font-size:14px;font-weight:700}
.open{color:#f6c54a;border:1px solid rgba(246,197,74,.4);background:rgba(246,197,74,.12)}
.check{color:#ff8d8d;border:1px solid rgba(255,141,141,.4);background:rgba(255,141,141,.12)}
small{display:block;color:#ffb1b1;font-size:14px;line-height:1.4}
</style>
</head>
<body>
<div id="home" class="page active">
  <h1>CASE FIT</h1>
  <a href="#search" class="btn green">🔎 Find Suitable Case</a>
  <a href="#glass" class="btn blue">🛡️ Screen Glass</a>
</div><div id="search" class="page">
  <h1 style="font-size:42px">CASE FIT</h1>
  <a href="#home" class="btn green" style="width:auto;display:inline-block;padding:16px 24px">← Back</a>

</div><div id="glass" class="page">
  <h1 style="font-size:42px">SCREEN GLASS</h1>
  <a href="#home" class="btn blue" style="width:auto;display:inline-block;padding:16px 24px">← Back</a>
  <div class="card"><h3>Coming Soon</h3></div>
</div><script>

function renderModel(mainName, subName, isOpen, isCheck){
 return `<div class="card"><h3>${mainName}</h3>${subName?`<p>Also fits ${subName}</p>`:''}${(isOpen||isCheck)?`<div class="badges">${isOpen?'<span class="badge open">OPEN TYPE</span>':''}${isCheck?'<span class="badge check">CHECK BEFORE BUY</span>':''}</div><small>Verify camera cutout, fingerprint slot, and speaker holes before final use.</small>`:''}</div>`;
}
function loadModels(){
 const list=document.getElementById('list');
 list.innerHTML='';
 models.forEach(item=>{
   let txt=item;
   const isOpen=/open type/i.test(txt);
   const isCheck=/check/i.test(txt);
   txt=txt.replace(/open type/ig,'').replace(/check/ig,'').trim();
   const parts=txt.split(' - ');
   const main=parts.shift();
   const sub=parts.join(' / ');
   list.innerHTML+=renderModel(main,sub,isOpen,isCheck);
 });
}
function route(){
 const hash=location.hash.replace('#','')||'home';
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 const page=document.getElementById(hash)||document.getElementById('home');
 page.classList.add('active');
 if(hash==='search') loadModels();
}
window.addEventListener('hashchange',route);
route();
</script></body>
